name: Publish Docker image

# Spustí se při push tagu vX.Y.Z (production release)
# nebo manuálně z UI (workflow_dispatch — pro testování).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Manuální tag (např. test, edge, 1.2.0-rc1)'
        required: true
        default: 'edge'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # = radekhulan/myinvoice

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write     # nutné pro push do ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Vytvoří tags + labels podle eventu:
      # - tag push v1.2.3 → image tagy: 1.2.3, 1.2, latest
      # - workflow_dispatch → image tag: <input>
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=MyInvoice.cz
            org.opencontainers.image.description=Czech invoicing system (PHP 8.5 + Vue 3 + MariaDB), multi-supplier
            org.opencontainers.image.vendor=MyWebdesign.cz s.r.o.
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # arm64 emulace přes QEMU je 5-10× pomalejší než nativní amd64,
          # ale pro infrequent release tagů akceptovatelné (~10 min total build).
          # Pokud by se to stalo problém, vypnout arm64 a publishovat jen amd64.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache — urychluje opakované buildy. mode=min ukládá jen final
          # image layers (ne intermediate composer/node deps). Trade-off: composer
          # install se rerunne na příštím buildu (+~30s), ale cache export je 10×
          # rychlejší (mode=max u multi-arch dělá 15+ min export po samotném push).
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Image digest
        run: echo "Pushed image digests, tags = ${{ steps.meta.outputs.tags }}"
