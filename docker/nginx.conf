# MyInvoice.cz — nginx config pro alpine variantu (Dockerfile.alpine).
#
# Funkční parity s root .htaccess (Apache). Pravidla 1:1:
#   /api/*       → api/public/index.php (Slim front controller; reálné soubory přímo)
#   /assets/*    → web/dist/assets/*    (Vite generuje absolutní /assets/ URL)
#   /manual      → manual/index.php     (pretty URL; statika v manual/ přímo)
#   statika      → /styles/, /web/ přímo
#   SPA fallback → web/dist/index.html
#
# ⚠️ nginx add_header footgun: location s VLASTNÍM add_header zahodí VŠECHNY
# zděděné add_header ze server bloku. Proto NEpoužíváme per-location add_header —
# bezpečnostní hlavičky jsou jen na server úrovni a Cache-Control se počítá přes
# `map $uri` do proměnné. Tím platí security hlavičky i pro statiku, /api i chyby.

user                 www-data;
worker_processes     auto;
pid                  /run/nginx.pid;
error_log            /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    access_log          /dev/stdout;
    sendfile            on;
    tcp_nopush          on;
    keepalive_timeout   65;
    server_tokens       off;

    # post_max_size = 25M (viz php ini) — nech nginx pustit upload + overhead.
    client_max_body_size 25m;

    # Komprimace (parity s mod_deflate).
    gzip                on;
    gzip_vary           on;
    gzip_min_length     256;
    gzip_proxied        any;
    gzip_types          text/plain text/css text/xml text/javascript
                        application/javascript application/json image/svg+xml application/yaml;

    # ---- HTTPS redirect parity (.htaccess pravidlo 1) -----------------------
    # Force HTTPS, VYJMA: loopback/localhost, RFC1918 privátní IP, .local mDNS,
    # a requestů už terminovaných na TLS reverse proxy (X-Forwarded-Proto=https).
    map $http_host $mi_is_private {
        default                                  0;
        "~*^localhost(:[0-9]+)?$"                1;
        "~*^127\."                               1;
        "~*^10\."                                1;
        "~*^192\.168\."                          1;
        "~*^172\.(1[6-9]|2[0-9]|3[01])\."        1;
        "~*\.local(:[0-9]+)?$"                   1;
    }
    map $http_x_forwarded_proto $mi_xfp {
        default     "";
        "https"     "https";
    }
    # Redirect jen když: NEpřišlo přes https proxy ("") A host NENÍ privátní (0).
    map "$mi_xfp:$mi_is_private" $mi_redirect_https {
        default     0;
        ":0"        1;
    }

    # ---- Cache-Control přes map (žádný per-location add_header) --------------
    # Pořadí = priorita (první shoda vyhraje):
    #   /api/*  → no-store (parity NOCACHE env trick)
    #   *.html  → no-cache (issue #140 — index.html drží mapu na hash-chunky)
    #   statika → immutable 1 rok (hashed assety)
    map $uri $mi_cache_control {
        default                                                              "";
        "~^/api/"                                                            "no-store";
        "~*\.html$"                                                          "no-cache, no-store, must-revalidate";
        "~*\.(woff2|woff|ttf|otf|eot|js|css|svg|png|jpg|jpeg|webp|ico)$"     "public, max-age=31536000, immutable";
    }

    server {
        listen          80 default_server;
        server_name     _;
        root            /var/www/html;
        index           index.php index.html;

        # ---- hlavičky (jen tady; viz add_header footgun pozn. nahoře) -------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), accelerometer=(self \"https://challenges.cloudflare.com\"), gyroscope=(self \"https://challenges.cloudflare.com\"), magnetometer=(self \"https://challenges.cloudflare.com\"), xr-spatial-tracking=(self \"https://challenges.cloudflare.com\")" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://validator.swagger.io https://cdn.redoc.ly; style-src 'self' 'unsafe-inline' https://unpkg.com; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://unpkg.com https://cdn.redoc.ly; worker-src 'self' blob:; font-src 'self' data:; connect-src 'self' https://unpkg.com https://cdn.redoc.ly; frame-src 'self' blob: https://challenges.cloudflare.com; object-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        add_header Cache-Control $mi_cache_control always;

        # ---- 1) force HTTPS -------------------------------------------------
        if ($mi_redirect_https) {
            return 301 https://$host$request_uri;
        }

        # ---- 2) blokace citlivých složek a souborů (parity pravidlo 2/2b) ---
        location ~ ^/(private|db|log|source|storage|tools|node_modules|api/(src|vendor|templates|tests|bin))(/|$) {
            return 403;
        }
        location ~ ^/(cfg\.php|cfg\.local\.php|composer\.(json|lock)|\.gitignore|\.env|[^/]*\.md|[^/]*\.sql)$ {
            return 403;
        }
        location ~* \.(env|sql|pem|log|lock|md)$ {
            return 403;
        }

        # ---- 3a) /assets/* → web/dist/assets/* ------------------------------
        location ^~ /assets/ {
            alias /var/www/html/web/dist/assets/;
            access_log off;
            try_files $uri =404;
        }

        # ---- 3b) /manual a /manual/ → manual/index.php ----------------------
        # (statické soubory v /manual/generated/ a /manual/img/ jdou přes `location /`)
        location = /manual {
            fastcgi_pass            127.0.0.1:9000;
            include                 fastcgi_params;
            fastcgi_param           SCRIPT_FILENAME /var/www/html/manual/index.php;
            fastcgi_param           SCRIPT_NAME     /manual/index.php;
            fastcgi_read_timeout    120s;
        }
        location = /manual/ {
            fastcgi_pass            127.0.0.1:9000;
            include                 fastcgi_params;
            fastcgi_param           SCRIPT_FILENAME /var/www/html/manual/index.php;
            fastcgi_param           SCRIPT_NAME     /manual/index.php;
            fastcgi_read_timeout    120s;
        }

        # ---- 3) /api/* → api/public/index.php (reálné soubory přímo) --------
        # openapi.yaml je reálný soubor pod /api → musí jít fetchnout (Swagger/Redoc).
        location = /api/openapi.yaml {
            default_type application/yaml;
            try_files $uri =404;
        }
        # ⚠️ PLAIN prefix (NE ^~) — `^~` by přebilo regex blokace výše a vystavilo
        # api/src, api/vendor apod. jako statiku. Plain prefix nechá regexy proběhnout
        # první (security blok matchne `api/(src|vendor|…)` → 403), a /api/health ap.
        # bez shody spadne sem na front controller.
        location /api/ {
            try_files $uri @api;
        }
        location @api {
            fastcgi_pass            127.0.0.1:9000;
            include                 fastcgi_params;
            fastcgi_param           SCRIPT_FILENAME /var/www/html/api/public/index.php;
            fastcgi_param           SCRIPT_NAME     /api/public/index.php;
            fastcgi_read_timeout    120s;
            # App si na /api sám nastaví Cache-Control: no-store. nginx ho přidává z
            # $mi_cache_control taky → skryjeme upstream verzi, ať není dvakrát (parity
            # s Apache `Header set` = replace). Server-level add_header pak dá jeden.
            fastcgi_hide_header     Cache-Control;
        }

        # ---- PHP handler (jen reálné .php soubory, např. manual/index.php) --
        location ~ \.php$ {
            try_files               $uri =404;
            fastcgi_pass            127.0.0.1:9000;
            include                 fastcgi_params;
            fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout    120s;
        }

        # ---- 4) statika + SPA fallback --------------------------------------
        # Vše co není reálný soubor a není /api/* → web/dist/index.html.
        location / {
            try_files $uri /web/dist/index.html;
        }
    }
}
