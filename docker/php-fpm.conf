; MyInvoice.cz — php-fpm pool override pro alpine variantu (Dockerfile.alpine).
; Instaluje se jako /usr/local/etc/php-fpm.d/zz-myinvoice.conf (přepíše default www.conf).

[www]
user  = www-data
group = www-data
listen = 127.0.0.1:9000

; ENV parity s mod_php (Apache): workery MUSÍ vidět kontejnerové ENV (DB creds,
; SMTP, MYINVOICE_*), jinak by 12-factor / ENV-only deploy (Railway, Heroku, Fly)
; nefungoval — Config::applyEnvOverrides čte z $_SERVER/getenv.
clear_env = no

; PHP warnings/notices/chyby z workerů → fpm stderr → `docker logs`.
catch_workers_output = yes
decorate_workers_output = no

; Low-RAM friendly: ondemand workery naskakují podle zátěže a po nečinnosti zhasnou.
; Strop 8 (≈ stejně jako Apache prefork na malém hostu); zvyš na výkonném stroji.
pm = ondemand
pm.max_children = 8
pm.process_idle_timeout = 10s
pm.max_requests = 500

; Access log neřešíme ve fpm (loguje nginx); chyby na stderr.
access.log = /dev/null
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
