        due_date: { type: string, format: date }
        received_at: { type: string, format: date }
        currency_id: { type: integer }
        currency: { type: string }
        total_without_vat: { type: number }
        total_vat: { type: number }
        total_with_vat: { type: number }
        advance_paid_amount: { type: number }
        amount_to_pay: { type: number, description: "Generated column = total_with_vat - advance_paid_amount" }
        exchange_rate: { type: number, nullable: true }
        exchange_rate_date: { type: string, format: date, nullable: true }
        status: { type: string, enum: [draft, received, booked, paid, cancelled] }
        booked_at: { type: string, format: date-time, nullable: true }
        paid_at: { type: string, format: date, nullable: true }
        cancelled_at: { type: string, format: date-time, nullable: true }
        vat_deduction: { type: string, enum: [full, none, proportional] }
        vat_deduction_percent: { type: number, format: float }
        tax_deductible: { type: boolean }
        extraction_warning: { type: string, nullable: true }
        currency_symbol: { type: string }
        vendor_company_name: { type: string }
        vendor_ic: { type: string, nullable: true }
        month_bucket: { type: string, example: "2026-05" }

    PurchaseInvoiceItem:
      type: object
      properties:
        id: { type: integer }
        purchase_invoice_id: { type: integer }
        description: { type: string }
        quantity: { type: number }
        unit: { type: string }
        unit_price_without_vat: { type: number }
        vat_rate_id: { type: integer }
        vat_rate_snapshot: { type: number }
        total_without_vat: { type: number }
        total_vat: { type: number }
        total_with_vat: { type: number }
        order_index: { type: integer }
        vat_code: { type: string, nullable: true, description: "Kód sazby ze snapshot-u (STD / RED1 / …)" }
        vat_label_cs: { type: string, nullable: true }
        vat_label_en: { type: string, nullable: true }
        vat_classification_code:
          type: string
          nullable: true
          description: "MFČR kód pro DPH/KH (připraveno pro fázi 6)"
        is_fixed_asset:
          type: boolean
          default: false
          description: |
            Řádek je za dlouhodobý majetek (§ 4 odst. 4 písm. c — vozidlo, stroj, ...).
            Per-řádek override umožňuje mixed doklady (pár položek majetek, zbytek běžné).
            Pokud je nastaveno na řádku, vyhrává nad `PurchaseInvoice.is_fixed_asset` (header).
            Hodnota se na DPHDP3 navíc uvede na ř. 47 (`nar_maj`).

    PurchaseInvoiceItemPayload:
      type: object
      required: [description, quantity, unit_price_without_vat, vat_rate_id]
      properties:
        description: { type: string }
        quantity: { type: number }
        unit: { type: string, default: ks }
        unit_price_without_vat: { type: number }
        vat_rate_id: { type: integer }
        order_index: { type: integer }
        vat_classification_code: { type: string, nullable: true }
        is_fixed_asset: { type: boolean, default: false }

    PurchaseInvoice:
      type: object
      properties:
        id: { type: integer }
        supplier_id: { type: integer }
        vendor_id: { type: integer }
        varsymbol: { type: string, nullable: true }
        vendor_invoice_number: { type: string }
        document_kind: { type: string, enum: [invoice, receipt, credit_note, advance] }
        advance_purchase_invoice_id: { type: integer, nullable: true, description: "FK na zálohovou fakturu, kterou tento doklad vyúčtovává (párování zálohy)" }
        advance_link_suggested_id: { type: integer, nullable: true, description: "AI/auto návrh na propojení zálohy (čeká na potvrzení)" }
        issue_date: { type: string, format: date }
        tax_date: { type: string, format: date, nullable: true }
        due_date: { type: string, format: date }
        received_at: { type: string, format: date }
        prices_include_vat: { type: boolean, description: "Ceny položek zadané včetně DPH (migrace 0083)" }
        expense_category_id: { type: integer, nullable: true, description: "FK do /expense-categories — kategorie nákladu pro CRM/dashboard" }
        expense_category_label: { type: string, nullable: true }
        expense_category_code: { type: string, nullable: true }
        currency_id: { type: integer }
        currency: { type: string }
        currency_symbol: { type: string }
        exchange_rate: { type: number, nullable: true }
        exchange_rate_date: { type: string, format: date, nullable: true }
        exchange_rate_source: { type: string, enum: [cnb, manual, idoklad, fakturoid] }
        reverse_charge: { type: boolean }
        vat_deduction:
          type: string
          enum: [full, none, proportional]
          default: full
          description: |
            Nárok na odpočet DPH. `none` = faktura NEvstupuje do Knihy DPH ani do
            DPHDP3 / KH (jen účetní náklad). `proportional` = krácený / poměrný odpočet
            (§75) — odpočet (základ i daň) se zkrátí o `vat_deduction_percent`.
        vat_deduction_percent:
          type: number
          format: float
          minimum: 0
          maximum: 100
          default: 100
          description: "Procento odpočtu při `vat_deduction='proportional'` (§75). Pro full/none se ignoruje (drží 100)."
        tax_deductible:
          type: boolean
          default: true
          description: "Daňová uznatelnost nákladu pro daň z příjmů (DPFO/DPPO); false = nezahrne se do nákladů. Nezávislé na DPH."
        is_fixed_asset:
          type: boolean
          default: false
          description: |
            Doklad je za dlouhodobý majetek (§ 4 odst. 4 písm. c) — vozidlo, stroj.
            Header flag pro celý doklad. Pro mixed doklady (část majetek, část běžné
            náklady) použij per-řádek `PurchaseInvoiceItem.is_fixed_asset`.

            Když je nastaveno a doklad jde do odpočtu na ř. 40-45 DPHDP3 (přímo
            nebo přes ř. 43 RC mirror), hodnota se navíc uvede na ř. 47 jako
            doplňující údaj (`nar_maj`).
        language: { type: string, enum: [cs, en] }
        note_above_items: { type: string, nullable: true }
        note_below_items: { type: string, nullable: true }
        vendor_snapshot:
          type: object
          description: Immutable JSON snapshot vendor row at time of receipt
        own_snapshot: { type: object, nullable: true }
        total_without_vat: { type: number }
        total_vat: { type: number }
        total_with_vat: { type: number }
        rounding: { type: number }
        advance_paid_amount: { type: number }
        amount_to_pay: { type: number }
        payment_currency_id: { type: integer, nullable: true }
        payment_exchange_rate: { type: number, nullable: true }
        paid_amount_payment_ccy: { type: number, nullable: true }
        paid_amount_invoice_ccy: { type: number, nullable: true }
        exchange_diff_base:
          type: number
          nullable: true
          description: "FX gain/loss v base ccy (CZK)"
        status: { type: string, enum: [draft, received, booked, paid, cancelled] }
        booked_at: { type: string, format: date-time, nullable: true }
        paid_at: { type: string, format: date, nullable: true }
        cancelled_at: { type: string, format: date-time, nullable: true }
        pdf_path:
          type: string
          nullable: true
          description: "Relative path within archive_storage"
        pdf_hash: { type: string, nullable: true, description: "SHA-256 hex" }
        pdf_size_bytes: { type: integer, nullable: true }
        pdf_original_name: { type: string, nullable: true }
        pdf_uploaded_at: { type: string, format: date-time, nullable: true }
        vat_classification_code: { type: string, nullable: true }
        vat_overrides:
          type: array
          nullable: true
          description: "Per-sazba override rekapitulace DPH (§73; migrace 0086). Zapéká se do řádkových totálů."
          items:
            type: object
            properties:
              rate: { type: number }
              base: { type: number }
              vat:  { type: number }
        extraction_warning: { type: string, nullable: true, description: "Varování z AI/automatické extrakce dokladu (rozdíl součtů apod.)" }
        idoklad_id: { type: integer, nullable: true, description: "ID v iDoklad (jen u importovaných)" }
        fakturoid_id: { type: integer, nullable: true, description: "ID ve Fakturoid (jen u importovaných)" }
        created_by: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        vendor_company_name: { type: string }
        vendor_ic: { type: string, nullable: true }
        vendor_dic: { type: string, nullable: true }
        vendor_main_email: { type: string, nullable: true }
        linked_advance:
          type: object
          nullable: true
          description: "Brief zálohy, kterou tento doklad vyúčtovává ({ id, varsymbol, document_kind, status, total_with_vat, currency })"
        advance_link_suggestion: { type: object, nullable: true, description: "Brief AI-navržené zálohy k propojení" }
        settled_by: { type: object, nullable: true, description: "Jen u zálohy — brief finální faktury, která ji vyúčtovává" }
        has_advance_candidates: { type: boolean }
        has_settlement_candidates: { type: boolean }
        items:
          type: array
          items: { $ref: '#/components/schemas/PurchaseInvoiceItem' }
        vat_breakdown:
          type: array
          items:
            type: object
            properties:
              vat_rate: { type: number }
              without_vat: { type: number }
              vat: { type: number }
              with_vat: { type: number }
        totals:
          type: object
          properties:
            without_vat: { type: number }
            vat: { type: number }
            with_vat: { type: number }
            rounding: { type: number }
            advance_paid_amount: { type: number }
            amount_to_pay: { type: number }

    PurchaseInvoicePayload:
      type: object
      required: [vendor_id, vendor_invoice_number, issue_date, due_date, currency_id, items]
      properties:
        vendor_id: { type: integer }
        vendor_invoice_number: { type: string, maxLength: 50 }
        varsymbol: { type: string, nullable: true, maxLength: 20 }
        document_kind: { type: string, enum: [invoice, receipt, credit_note, advance], default: invoice }
        issue_date: { type: string, format: date }
        tax_date: { type: string, format: date, nullable: true }
        due_date: { type: string, format: date }
        received_at: { type: string, format: date }
        currency_id: { type: integer }
        exchange_rate: { type: number, nullable: true }
        exchange_rate_date: { type: string, format: date, nullable: true }
        exchange_rate_source: { type: string, enum: [cnb, manual, idoklad, fakturoid], default: cnb }
        reverse_charge: { type: boolean, default: false }
        prices_include_vat: { type: boolean, default: false, description: "Ceny položek zadané včetně DPH (DPH shora koeficientem)." }
        expense_category_id: { type: integer, nullable: true, description: "Kategorie nákladu. Když chybí, na create se odvodí z default kategorie dodavatele." }
        vat_overrides:
          type: array
          nullable: true
          description: "Per-sazba override rekapitulace DPH (§73). Zapisuje se jen když je klíč přítomen; zapéká se do řádkových totálů."
          items:
            type: object
            properties:
              rate: { type: number }
              base: { type: number }
              vat:  { type: number }
        rounding: { type: number, description: "Jen PUT — zaokrouhlení dokladu; zapisuje se jen když je klíč přítomen." }
        vat_deduction: { type: string, enum: [full, none, proportional], default: full, description: "Nárok na odpočet DPH (none → mimo Knihu DPH/DPHDP3/KH; proportional → krácený §75 dle vat_deduction_percent)." }
        vat_deduction_percent: { type: number, format: float, minimum: 0, maximum: 100, default: 100, description: "Procento odpočtu pro proportional (§75)." }
        tax_deductible: { type: boolean, default: true, description: "Daňová uznatelnost pro daň z příjmů (nezávislé na DPH)." }
        is_fixed_asset:
          type: boolean
          default: false
          description: "Doklad za dlouhodobý majetek — propíše se do ř. 47 DPHDP3 jako doplňující údaj."
        language: { type: string, enum: [cs, en], default: cs }
        note_above_items: { type: string, nullable: true }
        note_below_items: { type: string, nullable: true }
        advance_paid_amount: { type: number, default: 0 }
        payment_currency_id: { type: integer, nullable: true }
        payment_exchange_rate: { type: number, nullable: true }
        paid_amount_payment_ccy: { type: number, nullable: true }
        paid_amount_invoice_ccy: { type: number, nullable: true }
        exchange_diff_base: { type: number, nullable: true }
        vat_classification_code: { type: string, nullable: true }
        items:
          type: array
          items: { $ref: '#/components/schemas/PurchaseInvoiceItemPayload' }

    InboxScanResult:
      type: object
      properties:
        created: { type: integer }
        skipped: { type: integer }
        failed: { type: integer }
        dry_run: { type: boolean }
        inbox_dir: { type: string }
        details:
          type: array
          items:
            type: object
            properties:
              file: { type: string }
              status:
                type: string
                enum: [created, skipped, failed, rejected, mapper_pending, config_missing, inbox_missing, limit_reached]
              reason: { type: string, nullable: true }
              purchase_invoice_id: { type: integer, nullable: true }
              isdoc_invoice_count: { type: integer, nullable: true }
              supplier_ic: { type: string, nullable: true }
