  # ─────────────────────────────── Dokumenty ───────────────────────────────
  /api/v1/documents:
    get:
      tags: [Documents]
      summary: Seznam dokumentů a podsložek v dané složce
      parameters:
        - { $ref: '#/components/parameters/SupplierIdHeader' }
        - { name: folder_id, in: query, schema: { type: integer, nullable: true }, description: 'NULL/prázdné = kořen' }
        - { name: doc_type, in: query, schema: { type: string, enum: [pdf, docx, xlsx, xml, zfo, p7s, zip, image, other] } }
      responses:
        '200':
          description: Výpis složky
          content:
            application/json:
              schema:
                type: object
                properties:
                  breadcrumb: { type: array, items: { $ref: '#/components/schemas/DocumentBreadcrumb' } }
                  folders: { type: array, items: { $ref: '#/components/schemas/DocumentFolder' } }
                  documents: { type: array, items: { $ref: '#/components/schemas/Document' } }
                  max_file_bytes: { type: integer }
    post:
      tags: [Documents]
      summary: Nahrání souborů (multipart). ZFO se automaticky rozbalí; ZIP dle zip_mode.
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                'file[]': { type: array, items: { type: string, format: binary } }
                folder_id: { type: integer, nullable: true }
                zip_mode: { type: string, enum: [explode, keep], default: keep }
                'relpaths[]': { type: array, items: { type: string }, description: 'Relativní cesty složek pro upload adresáře' }
      responses:
        '200':
          description: Souhrn nahrání
          content:
            application/json:
              schema:
                type: object
                properties:
                  created: { type: integer }
                  skipped: { type: array, items: { type: object } }
                  errors: { type: array, items: { type: object } }
  /api/v1/documents/search:
    get:
      tags: [Documents]
      summary: Fulltextové vyhledávání v názvech, popisech a obsahu (MariaDB FULLTEXT)
      parameters:
        - { $ref: '#/components/parameters/SupplierIdHeader' }
        - { name: q, in: query, required: true, schema: { type: string, minLength: 2 } }
      responses:
        '200':
          description: Výsledky
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents: { type: array, items: { $ref: '#/components/schemas/Document' } }
                  query: { type: string }
  /api/v1/documents/link-search:
