  /api/v1/purchase-invoices/{id}/settlement-candidates:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Purchase invoices]
      summary: Vyúčtovací faktury, se kterými lze tuto zálohu spárovat (opačný směr)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  candidates: { type: array, items: { type: object } }

  /api/v1/purchase-invoices/{id}/link-advance:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Purchase invoices]
      summary: Propojí finální přijatou fakturu se zálohovou (proti dvojímu nákladu)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [advance_id]
              properties:
                advance_id: { type: integer, format: int64 }
      responses:
        '200': { description: 'OK (aktualizovaná faktura vč. linked_advance)' }
        '409': { description: Propojení selhalo }
    delete:
      tags: [Purchase invoices]
      summary: Zruší propojení se zálohou
      responses:
        '200': { description: OK }

  /api/v1/purchase-invoices/{id}/advance-suggestion:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    delete:
      tags: [Purchase invoices]
      summary: Zamítne automatický návrh na spárování zálohy
      responses:
        '200': { description: OK }

  /api/v1/purchase-invoices/{id}/dismiss-extraction-warning:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Purchase invoices]
      summary: Skryje varování z AI/automatické extrakce dokladu
      responses:
        '200': { description: OK }

  # ── CRM dashboard — doplňující endpointy ─────────────────────────────────
  /api/v1/crm/yearly:
    get:
      tags: [CRM]
      summary: Historie tržeb/nákladů/zisku po rocích
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: currency, schema: { type: string } }
      responses: { '200': { description: Roční řady } }

  /api/v1/crm/dpo:
    get:
      tags: [CRM]
      summary: Days Payable Outstanding (Ø doba úhrady dodavatelům)
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: months, schema: { type: integer, default: 12 } }
      responses: { '200': { description: 'avg_days + sample_size' } }

  /api/v1/crm/vendor-concentration:
    get:
      tags: [CRM]
      summary: Riziko koncentrace nákladů (Top dodavatelé share + Pareto)
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: months, schema: { type: integer, default: 12 } }
        - { in: query, name: currency, schema: { type: string } }
      responses: { '200': { description: 'top1_share + pareto_80_count + risk_level' } }

  /api/v1/crm/revenue-breakdown:
    get:
      tags: [CRM]
      summary: Tržby per kategorie tržeb
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: months, schema: { type: integer, default: 12 } }
        - { in: query, name: currency, schema: { type: string } }
      responses: { '200': { description: Per-category totals } }

  /api/v1/crm/action-items/dismiss:
    post:
      tags: [CRM]
      summary: Skryje položku action-items (den / týden / natrvalo)
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_type, mode]
              properties:
                item_type: { type: string }
                mode: { type: string, description: 'day | week | forever | historical' }
      responses:
        '200': { description: ok }
        '400': { description: Neplatný vstup }

  /api/v1/crm/action-items/restore:
    post:
      tags: [CRM]
      summary: Vrátí (un-dismiss) skrytou položku action-items
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_type]
              properties:
                item_type: { type: string }
      responses:
        '200': { description: ok }

  /api/v1/crm/action-items/restore-all:
    post:
      tags: [CRM]
      summary: Vrátí všechny skryté položky action-items aktuálního uživatele
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      responses:
        '200': { description: 'ok + restored (počet)' }

  # ── Dashboard náklady ────────────────────────────────────────────────────
  /api/v1/dashboard/purchase-summary:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    get:
      tags: [Reports]
      summary: Dashboard nákladů (zrcadlo summary nad přijatými fakturami)
      description: |
        Agregace pro stránku **Náklady** nad `purchase_invoices`: KPI per měna
        (this/prev year + YoY), po splatnosti/nezaplacené závazky, top dodavatelé
        (YTD/loni/rolling 12m), náklady po měsících/rocích, rolling 12m, cash-outflow,
        aging závazků, forecast, rozpad DPH na vstupu (12m), rozpad nákladů po
        kategoriích, histogramy. VAT-aware (`is_vat_payer`). Zálohy se vyřazují
        z nákladů dle cash sémantiky (zaplaceno a nespárováno).
      responses:
        '200': { description: OK }

  # ── Daňový optimalizátor ─────────────────────────────────────────────────
  /api/v1/tax/analysis:
    get:
      tags: [Tax]
      summary: Daňová analýza za rok (retrospektiva nebo projekce)
      description: |
        Uzavřený rok → `mode: retrospective` (srovnání režimů na skutečném příjmu +
        YoY). Běžící rok → `mode: forecast` (YTD příjem + projekce a sledování limitů
        DPH/paušál). Vrací `profile`, `constants`, `available_years`, `is_vat_payer`.
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year, schema: { type: integer }, description: 'Default = aktuální rok' }
      responses:
        '200': { description: OK }
        '400': { description: Žádný supplier scope }
        '422': { description: Neplatný rok }

  /api/v1/tax/profile:
    put:
      tags: [Tax]
      summary: Uloží daňový profil supplier-a pro rok
      description: |
        Profil pro optimalizátor — paušál/skutečné výdaje, sleva na manžela, počet
        dětí, úroky z hypotéky, penzijní/životní pojištění, dary, pásmo paušální daně.
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TaxProfileInput' }
      responses:
        '200': { description: 'OK ({ profile: {...} })' }
        '400': { description: Žádný supplier scope }
        '422': { description: Neplatný rok }

  # ── Klienti / vyhledávání — doplňující endpointy ─────────────────────────
  /api/v1/clients/{id}/vat-status:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Lookup]
      summary: Online ověření plátcovství DPH klienta (ARES dle IČO / VIES dle DIČ)
      description: |
        Ověří a uloží `clients.is_vat_payer`. Když registr nerozhodne, vrátí dosud
        uložený příznak. ARES/VIES cache (24 h) → opakované volání nezatěžuje registry.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  is_vat_payer: { type: boolean }
                  source: { type: string, enum: [ares, vies, unknown] }
                  ic: { type: string, nullable: true }
                  dic: { type: string, nullable: true }
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/clients/lookup-bank:
    post:
      tags: [Lookup]
      summary: Zveřejněné bankovní účty z registru plátců DPH (CRPDPH) dle DIČ
      description: |
        Vrátí účty zveřejněné v registru plátců DPH (MFČR) + příznak nespolehlivého
        plátce. Vhodné při zakládání dodavatele (předvyplnění účtu z DIČ).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dic]
              properties:
                dic:
                  type: string
                  description: DIČ — 8–10 číslic (s i bez prefixu CZ)
                  example: "CZ27082440"
      responses:
        '200': { description: 'OK (účty + nespolehlivý plátce)' }
        '400': { description: Neplatné DIČ }

  /api/v1/search:
    get:
      tags: [Lookup]
      summary: Globální vyhledávač (klienti/dodavatelé + vydané/přijaté faktury)
      description: Min. 2 znaky, jinak prázdné výsledky. Tenant scope dle supplier-a.
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: q, required: true, schema: { type: string, minLength: 2 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  q: { type: string }
                  clients: { type: array, items: { type: object } }
                  invoices: { type: array, items: { type: object } }
                  purchase_invoices: { type: array, items: { type: object } }

  # ── Reports — doplňující endpointy ───────────────────────────────────────
  /api/v1/reports/dphdp3/settings:
    get:
      tags: [Reports]
      summary: Nastavení relevantní pro DPH přiznání (perioda, kód FÚ, plátcovství)
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      responses: { '200': { description: Settings } }

  /api/v1/reports/dphdp3/trend:
    get:
      tags: [Reports]
      summary: Trend daňové povinnosti DPH za více období
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year, schema: { type: integer } }
      responses: { '200': { description: Časová řada } }

  /api/v1/reports/dphdp3/drafts-prediction:
    get:
      tags: [Reports]
      summary: Predikce dopadu konceptů na příští DPH přiznání
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year, schema: { type: integer } }
        - { in: query, name: month, schema: { type: integer, minimum: 1, maximum: 12 } }
        - { in: query, name: quarter, schema: { type: integer, minimum: 1, maximum: 4 } }
      responses: { '200': { description: Predikce } }

  /api/v1/reports/dph-book/preview:
    get:
      tags: [Reports]
      summary: Náhled Knihy DPH (interní VAT žurnál, vždy měsíční)
      description: Interní pomůcka — NENÍ EPO podání.
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year, required: true, schema: { type: integer } }
        - { in: query, name: month, required: true, schema: { type: integer, minimum: 1, maximum: 12 } }
      responses: { '200': { description: Summary řádků žurnálu } }

  /api/v1/reports/dph-book:
    get:
      tags: [Reports]
      summary: Stáhne PDF Knihy DPH za měsíc
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year, required: true, schema: { type: integer } }
        - { in: query, name: month, required: true, schema: { type: integer, minimum: 1, maximum: 12 } }
      responses:
        '200':
          description: PDF download
          content:
            application/pdf:
              schema: { type: string, format: binary }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: mi_pat_
      description: Personal Access Token získaný v Nastavení → API tokeny.

  parameters:
    SupplierIdHeader:
      in: header
      name: X-Supplier-Id
      required: false
      description: |
        ID supplier-a (firmy), v jejíž kontextu má operace běžet. Vyžadováno
        jen u **multi-supplier účtů s tokenem bez bind**. Pokud je token bound
        na konkrétního supplier-a, hlavička se ignoruje.
      schema: { type: integer }

  responses:
    Unauthorized:
      description: Neplatný nebo chybějící token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Zdroj nenalezen
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationFailed:
      description: Validace selhala
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InsufficientScope:
      description: Token nemá dostatečný scope (např. `read` na write operaci)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: Překročen rate limit
      headers:
        Retry-After:
          schema: { type: integer }
          description: Sekundy do uvolnění
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    RevenueCategory:
      type: object
      properties:
        id: { type: integer }
        code: { type: string, maxLength: 20 }
        label: { type: string, maxLength: 100 }
        display_order: { type: integer }
        archived: { type: boolean }
        created_at: { type: string }
        invoices_count:
          type: integer
          description: Počet vydaných faktur v této kategorii (jen v listu)
    ExpenseCategory:
      type: object
      properties:
        id: { type: integer }
        code: { type: string, maxLength: 20 }
        label: { type: string, maxLength: 100 }
        fixed_or_var: { type: string, enum: [fixed, variable] }
        display_order: { type: integer }
        archived: { type: boolean }
        created_at: { type: string }
        purchases_count:
          type: integer
          description: Počet přijatých faktur v této kategorii (jen v listu)
    TaxConstantsYear:
      type: object
      description: Efektivní daňové konstanty pro rok (výchozí seed nebo override).
      additionalProperties: true
      properties:
        year: { type: integer }
        is_override:
          type: boolean
          description: true = přepsáno administrátorem, false = výchozí konstanty
    TaxConstantsInput:
      type: object
      description: |
        Daňové konstanty pro rok. Lze poslat ploše nebo zabaleně v `{ "data": {...} }`.
        Všechny skalární klíče jsou povinné; vnořené struktury musí být objekty/pole.
      required:
        - credit_taxpayer
        - credit_spouse
        - tax_rate_low
        - tax_rate_high
        - tax_high_threshold
        - social_rate
        - health_rate
        - social_assessment_pct
        - health_assessment_pct
        - social_min_base_main
        - social_min_base_secondary
        - health_min_base
        - mortgage_cap
        - pension_cap
        - vat_limit_low
        - vat_limit_high
        - pausal_annual
        - band_ceilings
        - expense_caps
        - child_credits
      properties:
        credit_taxpayer: { type: number, description: Sleva na poplatníka (Kč/rok) }
        credit_spouse: { type: number, description: Sleva na manžela/ku }
        tax_rate_low: { type: number, description: Nižší sazba daně z příjmu (%) }
        tax_rate_high: { type: number, description: Vyšší sazba daně z příjmu (%) }
        tax_high_threshold: { type: number, description: Práh pro vyšší sazbu }
        social_rate: { type: number }
        health_rate: { type: number }
        social_assessment_pct: { type: number }
        health_assessment_pct: { type: number }
        social_min_base_main: { type: number }
        social_min_base_secondary: { type: number }
        health_min_base: { type: number }
        mortgage_cap: { type: number, description: Strop odpočtu úroků z hypotéky }
        pension_cap: { type: number }
        vat_limit_low: { type: number, description: Limit obratu pro povinnou registraci DPH }
        vat_limit_high: { type: number }
        pausal_annual:
          type: object
          description: Měsíční/roční částky paušální daně per pásmo
        band_ceilings:
          type: object
          description: Stropy obratu pro pásma paušální daně
        expense_caps:
          type: object
          description: Stropy výdajových paušálů per míra (40/60/80 %)
        child_credits:
          type: array
          minItems: 1
          description: Slevy na dítě (1./2./3.+ dítě)
          items: { type: number }
    TaxProfileInput:
      type: object
      properties:
        year: { type: integer, description: 'Default = aktuální rok' }
        activity_rate: { type: integer, description: 'Výdajový paušál v % (40/60/80)', default: 60 }
        use_actual_expenses: { type: boolean }
        actual_expenses: { type: number }
        flat_tax_band: { type: string, description: Pásmo paušální daně }
        is_secondary: { type: boolean, description: Vedlejší činnost }
        spouse_credit: { type: boolean }
        children_count: { type: integer }
        mortgage_interest: { type: number }
        pension_contrib: { type: number }
        life_insurance: { type: number }
        donations: { type: number }
    DocumentBreadcrumb:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
    DocumentFolder:
      type: object
      properties:
        id: { type: integer }
        parent_id: { type: integer, nullable: true }
        name: { type: string }
        created_at: { type: string }
        subfolder_count: { type: integer, description: "Naplněno jen v listingu potomků; jinak 0" }
        file_count: { type: integer, description: "Naplněno jen v listingu potomků; jinak 0" }
        total_bytes: { type: integer, description: "Součet velikostí aktivních souborů ve složce (jen v listingu potomků)" }
    Document:
      type: object
      properties:
        id: { type: integer }
        supplier_id: { type: integer }
        folder_id: { type: integer, nullable: true }
        title: { type: string }
        description: { type: string, nullable: true }
        original_name: { type: string }
        filename: { type: string, description: "Název souboru na disku ({sha8}-{safeName})" }
        sha256: { type: string }
        mime_type: { type: string }
        size_bytes: { type: integer }
        doc_type: { type: string, enum: [pdf, docx, xlsx, xml, zfo, p7s, zip, image, other] }
        source: { type: string, enum: [manual, zfo_extract, zip_extract] }
        parent_document_id: { type: integer, nullable: true }
        signature_for_id: { type: integer, nullable: true }
        text_status: { type: string, enum: [none, extracted, unsupported, failed] }
        thumb_status: { type: string, enum: [none, generated, unsupported, failed] }
        has_thumb: { type: boolean }
        uploaded_by: { type: integer, nullable: true, description: "User ID nahrávajícího" }
        created_at: { type: string }
        deleted_at: { type: string, nullable: true, description: "Soft-delete (koš); NULL = aktivní" }
    DocumentLink:
      type: object
      properties:
        entity_type: { type: string, enum: [client, invoice, purchase_invoice, project] }
        entity_id: { type: integer }
        label: { type: string }
    DocumentLinkCandidate:
      type: object
      properties:
        entity_type: { type: string, enum: [client, invoice, purchase_invoice, project] }
        entity_id: { type: integer }
        label: { type: string }
        sublabel: { type: string }
        meta: { type: string }
    DocumentDmsMessage:
      type: object
      description: Metadata datové zprávy (ZFO) z ISDS
      properties:
        dm_id: { type: string, nullable: true }
        direction: { type: string, enum: [sent, received, unknown] }
        sender_box_id: { type: string, nullable: true }
        sender_name: { type: string, nullable: true }
        recipient_box_id: { type: string, nullable: true }
        recipient_name: { type: string, nullable: true }
        annotation: { type: string, nullable: true, description: Předmět zprávy }
        delivery_time: { type: string, nullable: true }
        acceptance_time: { type: string, nullable: true }
    DocumentDetail:
      allOf:
        - { $ref: '#/components/schemas/Document' }
        - type: object
          properties:
            tags: { type: array, items: { type: string } }
            links: { type: array, items: { $ref: '#/components/schemas/DocumentLink' } }
            attachments: { type: array, items: { $ref: '#/components/schemas/Document' } }
            dms_message: { $ref: '#/components/schemas/DocumentDmsMessage' }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, example: validation_failed }
            message: { type: string, example: "Pole 'name' je povinné." }

    Pagination:
      type: object
      properties:
        page: { type: integer, example: 1 }
        per_page: { type: integer, example: 50 }
        total: { type: integer, example: 423 }

    ApiMe:
      type: object
      properties:
        user:
          type: object
          properties:
            id: { type: integer }
            email: { type: string, format: email }
            name: { type: string }
            role: { type: string, enum: [admin, accountant, readonly] }
        supplier:
          oneOf:
            - $ref: '#/components/schemas/SupplierBrief'
            - { type: "null" }
        auth_method:
          type: string
          enum: [bearer, session]
        token:
          oneOf:
            - type: object
              properties:
                id: { type: integer }
                name: { type: string }
                prefix: { type: string, example: "mi_pat_abcd" }
                scope: { type: string, enum: [read, read_write] }
                expires_at: { type: string, format: date-time, nullable: true }
            - { type: "null" }

    SupplierBrief:
      type: object
      properties:
        id: { type: integer }
        company_name: { type: string }
        display_name: { type: string, nullable: true }

    Country:
      type: object
      properties:
        id: { type: integer }
        code: { type: string, example: CZ }
        name_cs: { type: string }
        name_en: { type: string }
        in_eu: { type: boolean }

    Currency:
      type: object
      properties:
        id: { type: integer }
        code: { type: string, example: CZK }
        symbol: { type: string, example: "Kč" }

    Money:
      type: object
      properties:
        amount: { type: number, format: float, example: 12500.50 }
        currency: { type: string, example: CZK }

    Client:
      type: object
      description: |
        Klient = firma v roli odběratele a/nebo dodavatele (jedna řádka, flagy
        `is_customer` / `is_vendor`). Stav archivace je timestamp `archived_at`
        (NULL = aktivní), ne boolean.
      properties:
        id: { type: integer }
        supplier_id: { type: integer }
        company_name: { type: string }
        first_name: { type: string, nullable: true }
        last_name: { type: string, nullable: true }
        ic: { type: string, nullable: true, description: IČO (8 číslic) }
        dic: { type: string, nullable: true, description: DIČ }
        street: { type: string }
        city: { type: string }
        zip: { type: string }
        country_id: { type: integer }
        country_iso2: { type: string, description: "Denormalizovaný ISO2 kód země (alias z countries)" }
        main_email: { type: string, format: email, description: "Hlavní email klienta — povinný. Bez e-mailových kontaktů (email_contacts) na něj chodí všechny zprávy; s kontakty slouží jako fallback a pro běžnou komunikaci." }
        phone: { type: string, nullable: true }
        language: { type: string, enum: [cs, en], description: "Jazyk faktur a emailů. Default cs." }
        currency_default_id: { type: integer, nullable: true, description: "Výchozí měna pro faktury klienta. Default = supplier.default_currency_id." }
        currency_default: { type: string, description: "Denormalizovaný kód výchozí měny (alias z currencies)" }
        vat_rate_default_id: { type: integer, nullable: true, description: "Legacy výchozí sazba DPH" }
        hourly_rate: { type: number, format: float, nullable: true, description: "Default hodinová sazba (CZK / hod) pro projekty klienta" }
        reverse_charge: { type: boolean, description: "Přenesená daňová povinnost — propisuje se do nových faktur." }
        is_customer: { type: boolean, description: "Role odběratele (vystavujeme mu faktury)" }
        is_vendor: { type: boolean, description: "Role dodavatele (evidujeme přijaté faktury)" }
        is_vat_payer: { type: boolean, description: "Plátce DPH (ověřitelné přes /clients/{id}/vat-status)" }
        auto_send_reminders: { type: boolean, description: "Automatické odesílání upomínek" }
        payment_due_default: { type: integer, nullable: true, description: "Default splatnost pro nové faktury klienta" }
        payment_due_unit: { type: string, enum: [days, month], nullable: true, description: "Jednotka splatnosti (dny / konec měsíce)" }
        note: { type: string, nullable: true }
        default_expense_category_id: { type: integer, nullable: true, description: "Default kategorie nákladu pro přijaté faktury dodavatele" }
        default_revenue_category_id: { type: integer, nullable: true, description: "Default kategorie tržby pro vydané faktury odběratele" }
        invoice_number_format: { type: string, nullable: true, description: "Per-klient override číselné řady faktur" }
        proforma_number_format: { type: string, nullable: true }
        credit_note_number_format: { type: string, nullable: true }
        invoice_number_period: { type: string, enum: [year, month, none], nullable: true }
        archived_at: { type: string, format: date-time, nullable: true, description: "NULL = aktivní; vyplněno = archivováno" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ClientEmailContact:
      type: object
      description: "E-mailový kontakt odběratele dle účelu (#86). Účely: communication (běžná komunikace), documents (faktury/dobropisy/poděkování za platbu), reminders (upomínky; bez nich fallback na documents), approvals (schvalování výkazů). Jakmile má klient aktivní kontakt s daným účelem, main_email se pro tento typ zprávy přestane automaticky přidávat (zůstává jen fallback)."
      properties:
        id: { type: integer, readOnly: true }
        email: { type: string, format: email }
        label: { type: string, nullable: true, maxLength: 80, description: 'Popisek (např. „účetní oddělení")' }
        contact_name: { type: string, nullable: true, maxLength: 120, description: "Jméno kontaktní osoby" }
        is_active: { type: boolean, default: true }
        sort_order: { type: integer, readOnly: true, description: "Pořadí — odvozeno z pořadí v zaslaném poli" }
        usages:
          type: array
          description: "Účely použití kontaktu + role příjemce."
          items:
            type: object
            required: [usage]
            properties:
              usage: { type: string, enum: [communication, documents, reminders, approvals] }
              recipient: { type: string, enum: [to, cc, bcc], default: to }

    ClientDetail:
      allOf:
        - $ref: '#/components/schemas/Client'
        - type: object
          properties:
            email_contacts:
              type: array
              items: { $ref: '#/components/schemas/ClientEmailContact' }
            projects:
              type: array
              items: { $ref: '#/components/schemas/Project' }
            invoices_count:
              type: integer
              description: Celkový počet faktur klienta.
            revenue_by_month:
              type: array
              description: "Obrat po měsících za posledních 24 měsíců (VAT-aware)."
              items:
                type: object
                properties:
                  month: { type: string, example: "2026-04" }
                  currency: { type: string }
                  total: { type: number, format: float }
            revenue_by_year:
              type: array
              description: "Obrat po letech (VAT-aware)."
              items:
                type: object
                properties:
                  year: { type: integer }
                  currency: { type: string }
                  total: { type: number, format: float }
                  count: { type: integer }
            revenue_by_project:
              type: array
              description: 'Obrat agregovaný per zakázka — pro graf "Obrat podle zakázek". Faktury bez project_id agregovány pod project_id=null.'
              items:
                type: object
                properties:
                  project_id: { type: integer, nullable: true }
                  project_name: { type: string, nullable: true }
                  currency: { type: string }
                  total: { type: number, format: float }
                  count: { type: integer }
            unpaid_summary:
              type: array
              items:
                type: object
                properties:
                  currency: { type: string }
                  unpaid_total:  { type: number, format: float }
                  unpaid_count:  { type: integer }
                  overdue_total: { type: number, format: float }
                  overdue_count: { type: integer }

    ClientInput:
      type: object
      required: [company_name, street, city, zip, main_email]
      properties:
        company_name: { type: string }
        first_name: { type: string, nullable: true }
        last_name: { type: string, nullable: true }
        ic: { type: string, nullable: true, description: "IČO — 8 číslic" }
        dic: { type: string, nullable: true }
        street: { type: string }
        city: { type: string }
        zip: { type: string }
        country_iso2: { type: string, default: CZ, description: "ISO2 kód země (resolvuje se na country_id). POZOR: vstup je `country_iso2`, ne `country_id`." }
        main_email: { type: string, format: email, description: "Hlavní email — povinný (POZOR: backend pole se jmenuje `main_email`, ne `email`)" }
        phone: { type: string, nullable: true, maxLength: 40 }
        language: { type: string, enum: [cs, en], default: cs }
        currency_default_id: { type: integer, nullable: true, description: "Výchozí měna klienta. Pokud chybí, použije se výchozí měna supplier-a." }
        currency_default: { type: string, description: "Legacy — kód měny (CZK…). Použij currency_default_id." }
        hourly_rate: { type: number, format: float, nullable: true, description: "Default hodinová sazba pro nové projekty (≥ 0)" }
        reverse_charge: { type: boolean, default: false }
        is_customer: { type: boolean, default: true, description: "Role odběratele. Aspoň jedna z is_customer/is_vendor musí zůstat true." }
        is_vendor: { type: boolean, default: false, description: "Role dodavatele." }
        is_vat_payer: { type: boolean, default: true }
        auto_send_reminders: { type: boolean, default: true }
        payment_due_default: { type: integer, minimum: 1, maximum: 365, description: "Default splatnost" }
        payment_due_unit: { type: string, enum: [days, month], nullable: true }
        note: { type: string, nullable: true }
        default_expense_category_id: { type: integer, nullable: true }
        default_revenue_category_id: { type: integer, nullable: true }
        invoice_number_format: { type: string, nullable: true, maxLength: 60 }
        proforma_number_format: { type: string, nullable: true }
        credit_note_number_format: { type: string, nullable: true }
        invoice_number_period: { type: string, enum: [year, month, none], nullable: true }
        email_contacts:
          type: array
          description: "E-mailové kontakty dle účelu (#86) — replace-all: pošli kompletní pole; klíč vynech, pokud kontakty neměníš. Max 10 kontaktů."
          items: { $ref: '#/components/schemas/ClientEmailContact' }

    Invoice:
      type: object
      properties:
        id: { type: integer }
        supplier_id: { type: integer }
        client_id: { type: integer }
        client_company_name: { type: string, description: "Denormalizováno z klienta pro pohodlí výpisů" }
        client_main_email: { type: string, format: email, nullable: true }
        project_id: { type: integer, nullable: true }
        project_name: { type: string, nullable: true }
        parent_invoice_id: { type: integer, nullable: true, description: "Pro credit_note / cancellation / final-z-proformy odkaz na původní fakturu" }
        recurring_template_id: { type: integer, nullable: true, description: "Pro faktury vygenerované ze šablony pravidelné fakturace — odkaz na šablonu (NULL pokud byla šablona smazána, viz ON DELETE SET NULL)." }
        varsymbol: { type: string, nullable: true, description: "Variabilní symbol = číslo faktury. Přiděluje se při issue (u draft je null nebo manuální override)." }
        invoice_type:
          type: string
          enum: [invoice, proforma, credit_note, cancellation]
        status:
          type: string
          enum: [draft, issued, sent, reminded, paid, cancelled]
        payment_method:
          type: string
          enum: [bank_transfer, card, cash, other]
          default: bank_transfer
          description: "Způsob úhrady. U card/cash se v PDF/emailu nezobrazuje QR ani bankovní spojení a místo výzvy k platbě se uvede odpovídající poznámka."
        language: { type: string, enum: [cs, en], description: "Jazyk PDF/emailů" }
        reverse_charge: { type: boolean }
        prices_include_vat: { type: boolean, description: "Ceny položek zadané včetně DPH (DPH se počítá shora koeficientem). Per-doklad, migrace 0083." }
        auto_send_reminders: { type: boolean, description: "Per-faktura přepínač automatických upomínek (migrace 0088). False = cron tuto fakturu přeskočí, i když má dodavatel i klient upomínky zapnuté." }
        client_ic: { type: string, nullable: true, description: "Denormalizováno z klienta" }
        client_dic: { type: string, nullable: true }
        revenue_category_id: { type: integer, nullable: true, description: "FK do /revenue-categories — kategorie tržby pro CRM/Grafy" }
        revenue_category_label: { type: string, nullable: true, description: "Denormalizovaný label kategorie tržby" }
        revenue_category_code: { type: string, nullable: true }
        revenue_category: { type: string, nullable: true, description: "Legacy volný textový tag (nahrazeno revenue_category_id)" }
        vat_classification_code: { type: string, nullable: true, description: "Hlavičkový default kódu klasifikace plnění (DPHDP3 / KH)" }
        issue_date: { type: string, format: date }
        due_date: { type: string, format: date }
        tax_date: { type: string, format: date, nullable: true, description: "DUZP — null u proforem" }
        currency_id: { type: integer, description: "FK do /settings/currencies (per-supplier)" }
        currency: { type: string, example: CZK, description: "Denormalizovaný kód měny (= currencies.code)" }
        currency_symbol: { type: string, example: "Kč" }
        exchange_rate: { type: number, format: float, nullable: true, description: "CZK / 1 jednotka cizí měny (ČNB). NULL = neaplikováno (např. faktura v CZK)" }
        exchange_rate_date: { type: string, format: date, nullable: true }
        total_without_vat: { type: number, format: float }
        total_vat: { type: number, format: float }
        total_with_vat: { type: number, format: float }
        rounding: { type: number, format: float, description: "Zaokrouhlení (CZK)" }
        advance_paid_amount: { type: number, format: float, description: "Záloha k odečtení (u faktury vystavované po proforme)" }
        amount_to_pay: { type: number, format: float, description: "total_with_vat + rounding − advance_paid_amount" }
        discount_percent: { type: number, format: float, description: "Procentuální sleva z celé faktury (0 = žádná). Materializuje se jako záporná položka „Sleva X %\" v `items`." }
        totals:
          type: object
          description: "Agregát pro renderování — duplikuje stejné hodnoty co výše"
          properties:
            without_vat: { type: number, format: float }
            vat: { type: number, format: float }
            with_vat: { type: number, format: float }
            rounding: { type: number, format: float }
            advance_paid_amount: { type: number, format: float }
            amount_to_pay: { type: number, format: float }
            discount_percent: { type: number, format: float, description: "Procentuální sleva z celé faktury (0 = žádná)" }
            discount_amount: { type: number, format: float, description: "Kladná peněžní hodnota slevy (= součet záporných slevových položek)" }
        vat_breakdown:
          type: array
          description: "Per-sazba rozpad DPH (vstup pro QR + PDF)"
          items:
            type: object
            properties:
              vat_rate_id: { type: integer }
              rate: { type: number, format: float, example: 21 }
              base: { type: number, format: float }
              vat:  { type: number, format: float }
              total: { type: number, format: float }
        czk_recap:
          nullable: true
          description: "CZK rekapitulace u cizoměnových faktur (null pokud měna == CZK nebo není zafixován kurz)"
          type: object
        note: { type: string, nullable: true, description: "Generická poznámka. Pro výstup viz note_above_items / note_below_items." }
        note_above_items: { type: string, nullable: true }
        note_below_items: { type: string, nullable: true }
        bank_account_number: { type: string, nullable: true, description: "Z currencies (per-měna bank účet supplier-a)" }
        bank_code: { type: string, nullable: true }
        bank_iban: { type: string, nullable: true }
        bank_bic: { type: string, nullable: true }
        approval_status:
          type: string
          nullable: true
          enum: [none, requested, approved, rejected]
        items:
          type: array
          items: { $ref: '#/components/schemas/InvoiceItem' }
        project_billing_emails:
          type: array
          items:
            type: object
            properties:
              email: { type: string, format: email }
              label: { type: string, nullable: true }
        final_invoice:
          type: object
          nullable: true
          description: "Jen u proformy — navázaný finální daňový doklad ({ id, varsymbol, status })"
        parent_invoice:
          type: object
          nullable: true
          description: "Jen pokud je parent_invoice_id ({ id, varsymbol, status, invoice_type })"
        has_advance_candidates: { type: boolean, description: "UI flag — existují nespárované zálohy k propojení" }
        has_final_candidates: { type: boolean }
        sent_at: { type: string, format: date-time, nullable: true, description: "Kdy byla naposledy odeslána emailem" }
        last_reminder_at: { type: string, format: date-time, nullable: true }
        reminder_count: { type: integer, description: "Počet odeslaných upomínek" }
        paid_at: { type: string, format: date, nullable: true }
        cancelled_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    InvoiceInput:
      type: object
      required: [client_id, items]
      description: |
        Vstup pro POST /invoices (vytvoří draft) i PUT /invoices/{id} (úprava draftu).
        Vystavená/zaplacená/storno faktura nelze upravovat — vrátí 409.
      properties:
        client_id: { type: integer, description: "Musí patřit aktuálnímu supplier-ovi" }
        project_id: { type: integer, nullable: true, description: "Pokud uvedeno, musí patřit `client_id`" }
        parent_invoice_id: { type: integer, nullable: true, description: "Jen při create (credit_note / final-z-proformy). Na UPDATE se ignoruje." }
        invoice_type:
          type: string
          enum: [invoice, proforma, credit_note, cancellation]
          default: invoice
        issue_date: { type: string, format: date, description: "Default = dnes" }
        due_date: { type: string, format: date, description: "Default = issue_date + payment_due_days (z projektu/klienta/supplier)" }
        tax_date: { type: string, format: date, nullable: true, description: "DUZP. U proform se ignoruje (uloží se null)." }
        currency_id: { type: integer, description: "FK do /settings/currencies (per-supplier). Default = výchozí měna projektu/klienta/supplier." }
        currency:
          type: string
          example: CZK
          deprecated: true
          description: "Legacy — kód měny (CZK, EUR, …) resolvuje se na `currency_id` v rámci supplier-a. Preferuj `currency_id`."
        language: { type: string, enum: [cs, en], description: "Default = language klienta (cs)" }
        reverse_charge: { type: boolean, description: "Přenesená daňová povinnost. Default = z klienta." }
        prices_include_vat: { type: boolean, default: false, description: "Ceny položek zadané včetně DPH (DPH shora koeficientem)." }
        auto_send_reminders: { type: boolean, default: true, description: "Per-faktura přepínač automatických upomínek (migrace 0088). False = cron tuto fakturu přeskočí." }
        revenue_category_id: { type: integer, nullable: true, description: "Kategorie tržby. Když chybí, na create se odvodí z defaultu projektu/klienta." }
        vat_classification_code: { type: string, nullable: true, description: "Hlavičkový default klasifikace plnění; auto-default podle sazby/RC/země, pokud prázdné." }
        varsymbol:
          type: string
          maxLength: 20
          nullable: true
          description: "Volitelný manuální override automatického číslování. U draftu lze ponechat null — číslo se přidělí při /issue."
        advance_paid_amount: { type: number, format: float, default: 0, description: "Záloha k odečtení od total_with_vat" }
        discount_percent:
          type: number
          format: float
          minimum: 0
          maximum: 100
          default: 0
          description: |
            Procentuální sleva z celé faktury (0–100). Při uložení se materializuje jako
            záporná položka „Sleva X %" rozpadlá na každou sazbu DPH zvlášť (proto se
            správně propíše do DPH rozpisu i daňových výkazů). Slevovou položku
            NEposílej ručně v `items` — generuje se z tohoto pole.
        payment_method:
          type: string
          enum: [bank_transfer, card, cash, other]
          default: bank_transfer
          description: "Způsob úhrady. Pro card/cash se v PDF/emailu nevygeneruje QR ani bankovní spojení."
        exchange_rate: { type: number, format: float, nullable: true, description: "Volitelný manuální override ČNB kurzu (CZK / 1 jednotka cizí měny)" }
        note: { type: string, nullable: true, description: "Generická poznámka (mapuje se na note_below_items pokud není uvedeno jinak)" }
        note_above_items: { type: string, nullable: true }
        note_below_items: { type: string, nullable: true }
        items:
          type: array
          items: { $ref: '#/components/schemas/InvoiceItemInput' }

    ProjectBilingEmail:
      type: object
      required: [position, email]
      properties:
        position: { type: integer, minimum: 1, maximum: 3 }
        email: { type: string, format: email }
        label: { type: string, nullable: true, example: "účetní" }
        usages:
          type: array
          nullable: true
          description: "Typy zpráv, pro které se e-mail použije (#86). NULL / prázdné / všechny tři = všechny typy (default, zpětně kompatibilní)."
          items: { type: string, enum: [documents, reminders, approvals] }

    ProjectBrief:
      type: object
      description: Zkrácená reprezentace zakázky (pro výpisy a selecty).
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        status: { type: string, enum: [active, paused, closed] }
        currency_id: { type: integer }
        currency: { type: string, example: CZK }
        hourly_rate: { type: number, format: float, example: 1500 }
        payment_due_days: { type: integer, example: 14 }
        payment_due_unit: { type: string, enum: [days, month], nullable: true, description: "Jednotka splatnosti (NULL = dny)" }
        project_number: { type: string, nullable: true }
        contract_number: { type: string, nullable: true }
        budget_total:   { type: number, nullable: true }
        budget_yearly:  { type: number, nullable: true }
        budget_monthly: { type: number, nullable: true }
        default_revenue_category_id: { type: integer, nullable: true, description: "Default kategorie tržby pro faktury zakázky" }
        archived_at: { type: string, format: date-time, nullable: true }

    Project:
      allOf:
        - $ref: '#/components/schemas/ProjectBrief'
        - type: object
          properties:
            client_id: { type: integer, format: int64 }
            client_company_name: { type: string }
            client_main_email: { type: string, format: email, nullable: true }
            supplier_id: { type: integer }
            note: { type: string, nullable: true }
            requires_work_report_approval: { type: boolean }
            billing_emails:
              type: array
              maxItems: 3
              items: { $ref: '#/components/schemas/ProjectBilingEmail' }
            billing_emails_mode:
              type: string
              enum: [auto, append, replace]
              default: auto
              description: "Jak kombinovat e-maily zakázky s kontakty klienta (#86): auto = dosavadní per-typ chování (doklady/upomínky přidat, schvalování nahradit), append = vždy přidat, replace = vždy nahradit."
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    ProjectDetail:
      allOf:
        - $ref: '#/components/schemas/Project'
        - type: object
          properties:
            invoices_count:
              type: integer
              description: Počet faktur navázaných na zakázku.
            revenue_by_month:
              type: array
              items:
                type: object
                properties:
                  month: { type: string, example: "2026-04" }
                  currency: { type: string, example: CZK }
                  total: { type: number, format: float }
            revenue_by_year:
              type: array
              items:
                type: object
                properties:
                  year: { type: integer, example: 2026 }
                  currency: { type: string, example: CZK }
                  total: { type: number, format: float }
                  count: { type: integer }
            unpaid_summary:
              type: array
              items:
                type: object
                properties:
                  currency: { type: string, example: CZK }
                  unpaid_total:  { type: number, format: float }
                  unpaid_count:  { type: integer }
                  overdue_total: { type: number, format: float }
                  overdue_count: { type: integer }

    ProjectInput:
      type: object
      required: [client_id, name]
      properties:
        client_id:
          type: integer
          format: int64
          description: Musí patřit aktuálnímu supplier-ovi.
        name:
          type: string
          maxLength: 190
          example: "Webové stránky 2026"
        status:
          type: string
          enum: [active, paused, closed]
          default: active
        currency_id:
          type: integer
          description: Default = výchozí měna supplier-a.
        currency:
          type: string
          deprecated: true
          description: "Legacy — kód měny (CZK…). Resolvuje se na currency_id. Preferuj currency_id."
        hourly_rate:
          type: number
          format: float
          example: 1500.00
        payment_due_days:
          type: integer
          minimum: 1
          maximum: 365
          example: 14
        payment_due_unit:
          type: string
          enum: [days, month]
          nullable: true
        default_revenue_category_id:
          type: integer
          nullable: true
          description: "Default kategorie tržby (musí patřit tenantovi); zpětně doplní existující faktury zakázky."
        project_number:
          type: string
          maxLength: 50
          nullable: true
        contract_number:
          type: string
          maxLength: 50
          nullable: true
        budget_total:
          type: number
          format: float
          nullable: true
        budget_yearly:
          type: number
          format: float
          nullable: true
        budget_monthly:
          type: number
          format: float
          nullable: true
        requires_work_report_approval:
          type: boolean
          default: false
          description: |
            Pokud `true`, faktury z této zakázky vyžadují schválení výkazu
            víceprací zákazníkem před vystavením.
        note:
          type: string
          nullable: true
        billing_emails:
          type: array
          maxItems: 3
          items: { $ref: '#/components/schemas/ProjectBilingEmail' }
          description: |
            Až 3 fakturační emaily (slot 1/2/3). Kombinace s kontakty/hlavním
            e-mailem klienta se řídí přes `billing_emails_mode` (default `auto`
            = dosavadní chování: u dokladů a upomínek se přidávají, u schvalování
            výkazů nahrazují).
        billing_emails_mode:
          type: string
          enum: [auto, append, replace]
          default: auto
          description: "Jak kombinovat e-maily zakázky s příjemci dle kontaktů klienta (#86)."

    WorkReportItem:
      type: object
      properties:
        id: { type: integer }
        description: { type: string, example: "Analýza požadavků a tech-spec" }
        hours: { type: number, format: float, example: 8.5 }
        rate:  { type: number, format: float, example: 1500 }
        total_amount: { type: number, format: float, example: 12750, description: hours × rate }
        order_index: { type: integer, example: 1 }
        work_date: { type: string, format: date, nullable: true, description: "Datum provedení úkonu (volitelné)" }

    WorkReportItemInput:
      type: object
      required: [description, hours, rate]
      properties:
        description: { type: string }
        hours: { type: number, format: float, minimum: 0 }
        rate:  { type: number, format: float, minimum: 0 }
        order_index: { type: integer }
        work_date: { type: string, format: date, description: "Datum provedení úkonu (volitelné, YYYY-MM-DD)" }

    WorkReport:
      type: object
      properties:
        id: { type: integer, format: int64 }
        invoice_id: { type: integer, format: int64 }
        project_id: { type: integer, format: int64, nullable: true }
        title: { type: string, example: "Květen 2026 — vývoj backendu" }
        total_hours: { type: number, format: float }
        total_amount: { type: number, format: float }
        items:
          type: array
          items: { $ref: '#/components/schemas/WorkReportItem' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    WorkReportInput:
      type: object
      required: [title, items]
      properties:
        project_id:
          type: integer
          nullable: true
          description: |
            Volitelné — pokud faktura má `project_id`, výkaz se na něj naváže
            automaticky. Pro faktury bez zakázky nechej `null`.
        title:
          type: string
          maxLength: 190
        items:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/WorkReportItemInput' }

    PdfArchiveEntry:
      type: object
      description: |
        Jeden snapshot vystaveného PDF. Soubor se ukládá s timestampem a typem
        akce (issue / send / reissue) v `storage/invoices-pdf/`. Pro stažení
        použij `GET /api/v1/invoices/{id}/pdfs/{archiveId}`.
      properties:
        id: { type: integer, format: int64 }
        invoice_id: { type: integer, format: int64 }
        kind:
          type: string
          enum: [issue, send, reissue, manual]
          description: Co snapshot iniciovalo
        filename: { type: string, example: "F2026-001.pdf" }
        size_bytes: { type: integer }
        sha256: { type: string, example: "9f86d081…" }
        created_at: { type: string, format: date-time }
        created_by_user_id: { type: integer, nullable: true }

    InvoiceAttachment:
      type: object
      properties:
        id: { type: integer, format: int64 }
        invoice_id: { type: integer, format: int64 }
        filename: { type: string, example: "podklad-vykaz.xlsx" }
        mime_type: { type: string, example: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" }
        size_bytes: { type: integer, example: 18452 }
        created_at: { type: string, format: date-time }

    AresLookupResult:
      type: object
      description: |
        Odpověď ARES lookup-u. Pokud IČO existuje, `found = true` (implicitní) a
        ostatní pole jsou vyplněná. Pro neexistující IČO vrátíme `{ found: false }`.
      properties:
        found: { type: boolean, example: true }
        source:
          type: string
          enum: [fresh, cache]
          description: Zda data přišla z ARES API nebo z 24h cache
        company_name: { type: string, example: "MyWebdesign.cz s.r.o." }
        ic:  { type: string, example: "27082440" }
        dic: { type: string, example: "CZ27082440" }
        street: { type: string }
        city: { type: string }
        zip: { type: string, example: "301 00" }
        country_iso2: { type: string, example: "CZ" }
        is_vat_payer: { type: boolean }
        date_active: { type: string, format: date, description: "Datum vzniku firmy" }
        legal_form: { type: string, example: "112" }

    ViesLookupResult:
      type: object
      properties:
        valid: { type: boolean }
        vat_id: { type: string, example: "DE123456789" }
        country_code: { type: string, example: "DE" }
        name: { type: string, nullable: true }
        address: { type: string, nullable: true }
        consultation_number:
          type: string
          nullable: true
          description: |
            VIES consultation number — důkazní záznam pro daňovou kontrolu, že DIČ
            byl k danému datu platný.
        request_date: { type: string, format: date-time }
        source:
          type: string
          enum: [fresh, cache]

    ActivityLogEntry:
      type: object
      properties:
        id: { type: integer, format: int64 }
        action:
          type: string
          example: "invoice.issued"
          description: "Tečka-separátor: entity.verb (např. invoice.paid, project.archived, auth.login)"
        entity_type: { type: string, nullable: true, example: "invoice" }
        entity_id:   { type: integer, format: int64, nullable: true }
        user_id:     { type: integer, format: int64, nullable: true, description: "Null = systémová akce (cron)" }
        user_email:  { type: string, format: email, nullable: true }
        payload:
          type: object
          additionalProperties: true
          nullable: true
          description: Akce-specifické metadata (citlivá pole se redaktují)
        ip:         { type: string, nullable: true, example: "203.0.113.42" }
        user_agent: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    DashboardSummary:
      type: object
      description: |
        Souhrnná data pro Dashboard (homepage) i stránku Grafy (`/stats`).

        **VAT-aware obrat:** Pro plátce DPH (`supplier.is_vat_payer = 1`) se obrat
        ve všech KPI a grafech počítá z `total_without_vat`; pro neplátce z
        `total_with_vat`. Flag `is_vat_payer` v response signalizuje použitou
        variantu.
      properties:
        today: { type: string, format: date }
        year: { type: integer, example: 2026 }
        prev_year: { type: integer, example: 2025 }
        is_vat_payer:
          type: boolean
          description: "Plátce DPH? Určuje použitý sloupec obratu (total_without_vat vs total_with_vat)."
        kpi:
          type: object
          properties:
            per_currency:
              type: array
              description: "Per měna: obrat YTD + loni + YTD loni (do stejného kalendářního dne) + počty faktur/klientů/zakázek pro každý rok."
              items:
                type: object
                properties:
                  currency: { type: string }
                  this_year: { type: number }
                  prev_year: { type: number }
                  prev_year_ytd: { type: number, description: "Obrat loni do stejného dne v roce (pro fair YoY)" }
                  change_pct: { type: number, nullable: true, description: "Letošek vs prev_year_ytd v %" }
                  this_year_invoice_count: { type: integer }
                  prev_year_invoice_count: { type: integer }
                  this_year_client_count: { type: integer, description: "DISTINCT klienti v této měně (letos)" }
                  prev_year_client_count: { type: integer }
                  this_year_project_count: { type: integer, description: "DISTINCT zakázky v této měně (letos)" }
                  prev_year_project_count: { type: integer }
            issued_count_ytd: { type: integer }
            overdue_count: { type: integer }
            overdue_per_currency:
              type: array
              items:
                type: object
                properties:
                  currency: { type: string }
                  count: { type: integer }
                  total: { type: number }
            avg_payment_days: { type: number, nullable: true }
            status_counts_ytd:
              type: object
              additionalProperties: { type: integer }
        overdue:
          type: array
          items: { $ref: '#/components/schemas/Invoice' }
        unpaid_upcoming:
          type: array
          items: { $ref: '#/components/schemas/Invoice' }
        top_clients_ytd:
          type: array
          description: "Top 12 klientů YTD per měna."
          items: { $ref: '#/components/schemas/TopClient' }
        top_clients_prev_year:
          type: array
          description: "Top 12 klientů za minulý rok per měna."
          items: { $ref: '#/components/schemas/TopClient' }
        top_clients_12m:
          type: array
          description: "Top 12 klientů za rolling posledních 12 měsíců. Robustní vůči začátku roku (kdy YTD je téměř prázdné)."
          items: { $ref: '#/components/schemas/TopClient' }
        revenue_by_month:
          type: array
          description: "Per měna: rolling 12 měsíců (`months`) + odpovídajících 12 měsíců o rok dříve (`prev_year`)."
          items:
            type: object
            properties:
              currency: { type: string }
              months:
                type: array
                items: { $ref: '#/components/schemas/MonthBucket' }
              prev_year:
                type: array
                items: { $ref: '#/components/schemas/MonthBucket' }
        revenue_by_year:
          type: array
          description: "Obrat po rocích — všechny roky s aktivitou, VAT-aware."
          items:
            type: object
            properties:
              year: { type: integer }
              currency: { type: string }
              total: { type: number }
              invoice_count: { type: integer }
        rolling_12m:
          type: array
          description: "Plovoucí 12měsíční obrat (rolling) per měna + 12 měsíců předtím (pro rolling YoY srovnání). Relevantní pro DPH limit 2 000 000 Kč."
          items:
            type: object
            properties:
              currency: { type: string }
              total: { type: number, description: "Obrat za posledních 12 měsíců (rolling)" }
              prev_period_total: { type: number, description: "Obrat za 12 měsíců předtím" }
        revenue_last_30d:
          type: array
          description: "Live indikátor obratu za posledních 30 dní per měna."
          items:
            type: object
            properties:
              currency: { type: string }
              total: { type: number }
              invoice_count: { type: integer }
        revenue_forecast:
          type: array
          description: |
            Forecast ročního obratu — medián tří nezávislých projekcí (odolný vůči odlehlému signálu).

            **Postup:** medián ze tří signálů —
            (1) run-rate `ytd / uplynulé_dny × dní_v_roce`,
            (2) sezonalita × krátkodobý růst `ytd + prev_year_remainder × growth_short`,
            (3) sezonalita × dlouhodobý trend `ytd + prev_year_remainder × growth_trend`.
            `forecast` je medián, `forecast_low`/`forecast_high` rozpětí (min/max projekcí).
            Bez loňských dat (`prev_year_full = 0`) se použije pouze run-rate.
          items:
            type: object
            properties:
              currency: { type: string }
              ytd: { type: number, description: "Obrat letos Jan 1 – dnes" }
              prev_year_remainder: { type: number, description: "Obrat loni od dneška do konce roku (sezonalita)" }
              prev_year_full: { type: number, description: "Celý loňský rok pro srovnání" }
              growth_short: { type: number, description: "Krátkodobý růst: rolling 12m / předch. 12m, cap [0.5, 2.5]" }
              growth_trend: { type: number, description: "Dlouhodobý trend: CAGR z posledních ≤5 let, cap [0.8, 1.8]" }
              forecast: { type: number, description: "Medián tří projekcí — predikovaný celoroční obrat" }
              forecast_low: { type: number, description: "Nejnižší ze tří projekcí (spodní hranice rozpětí)" }
              forecast_high: { type: number, description: "Nejvyšší ze tří projekcí (horní hranice rozpětí)" }
        cashflow_ytd:
          type: array
          description: "Měsíční cash-flow (skutečné platby `paid_at`) letošek + minulý rok per měna. Doplňuje obrat o reálné inkaso."
          items:
            type: object
            properties:
              currency: { type: string }
              months:
                type: array
                items: { $ref: '#/components/schemas/MonthBucket' }
              prev_year:
                type: array
                items: { $ref: '#/components/schemas/MonthBucket' }
        cashflow_forecast:
          type: array
          description: "Kumulativní cash-flow forecast — co přiteče z neuhrazených faktur v příštích 30/60/90 dnech."
          items:
            type: object
            properties:
              currency: { type: string }
              in_30: { type: number }
              in_60: { type: number }
              in_90: { type: number }
              count_30: { type: integer }
              count_60: { type: integer }
              count_90: { type: integer }
        due_buckets:
          type: array
          description: "Splatnost neuhrazených faktur — kumulativně dnes / tento týden (Po-Ne) / tento měsíc."
          items:
            type: object
            properties:
              currency: { type: string }
              today_count: { type: integer }
              today_total: { type: number }
              week_count: { type: integer }
              week_total: { type: number }
              month_count: { type: integer }
              month_total: { type: number }
        aging_report:
          type: array
          description: "Aging report — stáří pohledávek po splatnosti v bucketech per měna."
          items:
            type: object
            properties:
              currency: { type: string }
              current: { type: number, description: "Ještě před splatností" }
              b1_30: { type: number, description: "1–30 dní po splatnosti" }
              b31_60: { type: number }
              b61_90: { type: number }
              b90_plus: { type: number, description: "Více než 90 dní po splatnosti" }
              current_n: { type: integer }
              b1_30_n: { type: integer }
              b31_60_n: { type: integer }
              b61_90_n: { type: integer }
              b90_plus_n: { type: integer }
        payment_days_histogram:
          type: object
          description: "Distribuce doby úhrady (`paid_at - issue_date`) za posledních 12 měsíců."
          properties:
            buckets:
              type: array
              items:
                type: object
                properties:
                  key: { type: string, enum: ["0-7", "8-14", "15-30", "30+"] }
                  label: { type: string }
                  count: { type: integer }
            total: { type: integer }
            avg_days: { type: number, nullable: true }
        vat_breakdown_12m:
          type: array
          description: |
            Rozpad obratu (base bez DPH) podle sazby DPH — **pouze pro plátce DPH**.
            Pro neplátce vrací prázdné pole. Per měna a `vat_rate_snapshot`.
            Reverse-charge řádky jsou vyznačeny labelem „RC (reverse charge)".
          items:
            type: object
            properties:
              label: { type: string, example: "21 %" }
              base: { type: number, description: "Suma total_without_vat" }
              currency: { type: string }
        invoice_size_histogram:
          type: object
          description: "Histogram velikosti faktur za posledních 12 měsíců. Buckety v CZK ekvivalentu (non-CZK přepočtené přes `exchange_rate`)."
          properties:
            buckets:
              type: array
              items:
                type: object
                properties:
                  key: { type: string, enum: ["0-5", "5-25", "25-100", "100+"] }
                  label: { type: string }
                  count: { type: integer }
                  total_czk: { type: number }
            total: { type: integer }
        active_clients_count:
          type: integer
          description: "Počet nearchivovaných klientů aktuálního dodavatele."
        active_recurring_count:
          type: integer
          description: "Počet aktivních šablon pravidelné fakturace."
        pending_approvals:
          type: object
          properties:
            requested: { type: integer }
            overdue: { type: integer, description: "Bez reakce > 5 dní" }

    TopClient:
      type: object
      properties:
        client_id: { type: integer }
        company_name: { type: string }
        currency: { type: string }
        total: { type: number }
        invoice_count: { type: integer }

    MonthBucket:
      type: object
      properties:
        ym: { type: string, example: "2026-04", description: "Měsíc ve formátu YYYY-MM" }
        total: { type: number }

    ProjectStats:
      type: object
      description: "Statistiky zakázek pro stránku Grafy. VAT-aware (viz `is_vat_payer`)."
      properties:
        this_year: { type: integer, example: 2026 }
        prev_year: { type: integer, example: 2025 }
        primary_currency:
          type: string
          description: "Nejvyužívanější měna ve fakturách — používá se k filtrování per-currency agregací."
        is_vat_payer: { type: boolean }
        top_this_year: { $ref: '#/components/schemas/ProjectStatsBlock' }
        top_prev_year: { $ref: '#/components/schemas/ProjectStatsBlock' }
        top_12m:
          allOf:
            - $ref: '#/components/schemas/ProjectStatsBlock'
            - description: "Top 12 zakázek za rolling posledních 12 měsíců. Robustní vůči začátku roku."
        totals_per_year:
          type: array
          items:
            type: object
            properties:
              year: { type: integer }
              currency: { type: string }
              total: { type: number }
              invoice_count: { type: integer }
        status_breakdown:
          type: array
          items:
            type: object
            properties:
              status: { type: string, enum: [active, paused, closed] }
              count: { type: integer }

    ProjectStatsBlock:
      type: object
      properties:
        top:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              name: { type: string }
              client_company_name: { type: string }
              revenue: { type: number }
              invoice_count: { type: integer }
        others:
          type: object
          description: 'Agregovaná položka "Ostatní" (mimo top 12).'
          properties:
            revenue: { type: number }
            count: { type: integer }

    BankStatement:
      type: object
      description: "Položka seznamu výpisů (GET /bank-statements). Bankovní spojení dodavatele je per-měna na /settings/currencies, ne tady."
      properties:
        id: { type: integer, format: int64 }
        file_name: { type: string, example: "vypis_2026_05.gpc" }
        account_number: { type: string, example: "1234567890/0100" }
        currency: { type: string, nullable: true, example: EUR, description: "ISO 4217. Odvozeno z transakcí výpisu nebo z currencies.account_number. NULL u výpisů importovaných před v4.1.0." }
        statement_date: { type: string, format: date }
        statement_number: { type: string, nullable: true }
        prev_balance: { type: number, format: float }
        curr_balance: { type: number, format: float }
        transaction_count: { type: integer }
        matched_count: { type: integer }
        imported_at: { type: string, format: date-time }
        has_file: { type: boolean, description: "True pokud server má uložený originál výpisu — ke stažení přes /bank-statements/{id}/download." }
        has_pdf: { type: boolean, description: "True pokud je nahrán doprovodný PDF výpis." }
        pdf_name: { type: string, nullable: true }
        account_label: { type: string, nullable: true, description: "Odvozeno z currencies.label" }

    BankStatementDetail:
      allOf:
        - $ref: '#/components/schemas/BankStatement'
        - type: object
          properties:
            file_hash: { type: string, description: "SHA-256 originálního souboru" }
            bank_code: { type: string, nullable: true }
            credit_total: { type: number, format: float, nullable: true }
            debit_total: { type: number, format: float, nullable: true }
            imported_by: { type: integer, nullable: true, description: "User ID importujícího" }
            transactions:
              type: array
              items: { $ref: '#/components/schemas/BankTransaction' }

    BankTransaction:
      type: object
      properties:
        id: { type: integer, format: int64 }
        statement_id: { type: integer, format: int64 }
        posted_at: { type: string, format: date }
        amount: { type: number, format: float, example: 12500.00 }
        currency: { type: string, nullable: true, example: CZK }
        variable_symbol: { type: string, nullable: true }
        constant_symbol: { type: string, nullable: true }
        specific_symbol: { type: string, nullable: true }
        counterparty_account: { type: string, nullable: true }
        counterparty_bank: { type: string, nullable: true }
        counterparty_name: { type: string, nullable: true }
        description: { type: string, nullable: true }
        bank_ref: { type: string, nullable: true, description: "Bankovní referenční ID transakce" }
        match_status:
          type: string
          enum: [unmatched, auto_exact, auto_partial, manual, ignored]
          description: "Stav párování. auto_* = automatika, manual = ruční přiřazení."
        matched_invoice_id: { type: integer, format: int64, nullable: true, description: "Spárovaná VYDANÁ faktura" }
        matched_purchase_invoice_id: { type: integer, format: int64, nullable: true, description: "Spárovaná PŘIJATÁ faktura (z payment_matches; jen v detailu)" }
        matched_varsymbol: { type: string, nullable: true }
