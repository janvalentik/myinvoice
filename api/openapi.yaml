        vat_period: { type: string, enum: [monthly, quarterly], nullable: true }
        financial_office_code: { type: string, nullable: true, description: "Kód FÚ pro EPO (= CRPDPH cisloFu)" }
        flat_tax_band: { type: string, enum: [none, band1, band2, band3], description: "Pásmo paušální daně" }
        email_branding_enabled: { type: boolean }
        email_accent_color: { type: string, example: "#3B2D83" }
        has_email_logo: { type: boolean }
        auto_send_reminders: { type: boolean }
        reminder_days_after_due: { type: integer, minimum: 1, maximum: 365, default: 3, description: "Per-dodavatel práh: po kolika dnech po splatnosti poslat první automatickou upomínku (migrace 0089). CLI --days ho přebije." }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProjectsPagination:
