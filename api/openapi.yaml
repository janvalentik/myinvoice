        unit: { type: string, default: "ks" }
        unit_price_without_vat: { type: number, format: float, description: "Jednotková cena BEZ DPH. Může být záporná pro slevový řádek, ale ne současně se záporným množstvím." }
        vat_rate_id: { type: integer, description: "FK do /codebooks/vat-rates (kontextově k supplierovi)" }
        order_index: { type: integer, description: "Pořadí v rámci faktury. Default = pozice v poli." }
        vat_classification_code: { type: string, nullable: true, description: "Volitelný kód klasifikace plnění (DPH přiznání / KH). Když nevyplněno, server dopočítá default podle sazby + reverse charge + země klienta." }

    RecurringTemplate:
      type: object
      description: "Šablona pravidelné fakturace. Cron `bin/cron-generate-recurring-invoices.php` generuje faktury dle periodicity."
      properties:
        id: { type: integer }
        supplier_id: { type: integer }
        client_id: { type: integer }
        client_company_name: { type: string }
        project_id: { type: integer, nullable: true }
        project_name: { type: string, nullable: true }
        name: { type: string, description: "Display name pro admin (např. \"Hosting Acme s.r.o.\")" }
        frequency:
          type: string
          enum: [monthly, quarterly, semi_annually, annually]
        day_of_month:
          type: integer
          nullable: true
          description: "1–28; pokud null a end_of_month=false, odvodí se z anchor_date"
        end_of_month:
          type: boolean
          description: "true = poslední den měsíce (28/29/30/31 dynamicky); přebíjí day_of_month"
        anchor_date: { type: string, format: date }
        end_date:    { type: string, format: date, nullable: true }
        next_run_date: { type: string, format: date }
        last_run_date: { type: string, format: date, nullable: true }
        invoice_type:
          type: string
          enum: [invoice, proforma]
        currency_id: { type: integer }
        currency: { type: string, example: CZK }
        language: { type: string, enum: [cs, en] }
        payment_method:
          type: string
          enum: [bank_transfer, card, cash, other]
        reverse_charge: { type: boolean }
        payment_due_days: { type: integer }
        discount_percent: { type: number, format: float, description: "Procentuální sleva (0–100) zděděná na každou vygenerovanou fakturu." }
        draft_open_mode:
          type: string
          enum: [at_issue, period_start]
          description: "at_issue = koncept vznikne až v den vystavení; period_start = koncept se otevře na začátku období (průběžný výkaz víceprací) a vystaví se na konci."
        reminder_days_before: { type: integer, description: "0–14; připomenutí konceptu N dní před vystavením (0 = vypnuto; jen pro period_start)." }
        note_above_items: { type: string, nullable: true }
        note_below_items: { type: string, nullable: true }
        increment_month_in_descriptions:
          type: boolean
          description: "Posun M/YYYY v popiscích položek (např. „Hosting 3/2026\" → „Hosting 4/2026\"). Pro frequency != monthly se posouvá o odpovídající počet měsíců."
        auto_issue:
          type: boolean
          description: "true = cron rovnou vystaví (varsymbol + snapshot, status=issued); false = nechá draft"
        auto_send_email:
          type: boolean
          description: "true = po vystavení rovnou odešle klientovi; vyžaduje auto_issue=true"
        status:
          type: string
          enum: [active, paused, expired]
        invoices_generated_count: { type: integer }
        last_error: { type: string, nullable: true, description: "Poslední chyba generování (cron) — UI ji ukáže jako banner u šablony; vyčistí se po úspěšném ručním běhu." }
        last_error_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string }
        updated_at: { type: string }
        items:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              description: { type: string }
              quantity: { type: number, format: float, description: "Může být záporné pro slevový řádek. Nesmí být 0." }
              unit: { type: string }
              unit_price_without_vat: { type: number, format: float, description: "Může být záporná pro slevový řádek." }
              vat_rate_id: { type: integer }
              vat_rate_percent: { type: number, format: float }
              order_index: { type: integer }

    RecurringTemplateInput:
      type: object
      required: [client_id, name, frequency, anchor_date, currency_id, items]
      properties:
        client_id: { type: integer }
        project_id: { type: integer, nullable: true }
        name: { type: string, maxLength: 200 }
        frequency:
          type: string
          enum: [monthly, quarterly, semi_annually, annually]
        day_of_month:
          type: integer
          minimum: 1
          maximum: 28
          nullable: true
        end_of_month: { type: boolean, default: false }
        anchor_date: { type: string, format: date }
        end_date:    { type: string, format: date, nullable: true }
        invoice_type:
          type: string
          enum: [invoice, proforma]
          default: invoice
        currency_id: { type: integer }
        language: { type: string, enum: [cs, en], default: cs }
        payment_method:
          type: string
          enum: [bank_transfer, card, cash, other]
          default: bank_transfer
        reverse_charge: { type: boolean, default: false }
        payment_due_days: { type: integer, default: 14 }
        discount_percent:
          type: number
          format: float
          minimum: 0
          maximum: 100
          default: 0
          description: "Procentuální sleva z celé faktury (0–100); zdědí ji každá vygenerovaná faktura (materializuje se jako záporná položka „Sleva X %\")."
        draft_open_mode:
          type: string
          enum: [at_issue, period_start]
          default: at_issue
          description: "period_start (koncept na začátku období → vystavení na konci) vyžaduje auto_issue=true."
        tax_date_mode:
          type: string
          enum: [same_as_issue, previous_month_last_day]
          default: same_as_issue
          description: "DUZP vygenerované faktury: stejné jako datum vystavení, nebo poslední den předchozího měsíce."
        reminder_days_before:
          type: integer
          minimum: 0
          maximum: 14
          default: 0
          description: "Připomenutí konceptu N dní před vystavením (jen draft_open_mode=period_start; 0 = vypnuto)."
        note_above_items: { type: string, nullable: true }
        note_below_items: { type: string, nullable: true }
        increment_month_in_descriptions: { type: boolean, default: true }
        auto_issue: { type: boolean, default: true }
        auto_send_email: { type: boolean, default: true }
        items:
          type: array
          items:
            type: object
            required: [description, quantity, unit_price_without_vat, vat_rate_id]
            properties:
              description: { type: string }
              quantity: { type: number, format: float, description: "Nesmí být 0. Může být záporné pro slevový řádek, ale ne současně se zápornou cenou." }
              unit: { type: string, default: ks }
              unit_price_without_vat: { type: number, format: float, description: "Může být záporná pro slevový řádek, ale ne současně se záporným množstvím." }
              vat_rate_id: { type: integer }
              order_index: { type: integer }

    # ========================================================================
