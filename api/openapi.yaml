      summary: Historie všech generovaných EPO XML výkazů
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200':
          description: List archived submissions
          content:
            application/json:
              schema: { type: array, items: { type: object } }

  /api/v1/reports/submissions/{id}:
    get:
      tags: [Reports]
      summary: Detail záznamu (vč. XML)
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200': { description: Submission detail }
        '404': { description: Not found }
    delete:
      tags: [Reports]
      summary: Smaže archivovaný záznam (jen admin)
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200': { description: Deleted }
        '403': { description: Pouze admin }

  /api/v1/reports/submissions/{id}/xml:
    get:
      tags: [Reports]
      summary: Stáhne archivované XML
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200':
          description: XML download
          content:
            application/xml: {}

  # ── Codebooks: cnb-rate + expense-categories + vat-classifications ──────
  /api/v1/codebooks/cnb-rate:
    get:
      tags: [Codebooks]
      summary: ČNB exchange rate pro currency + datum
      parameters:
        - { in: query, name: currency, required: true, schema: { type: string, example: "EUR" } }
        - { in: query, name: date, required: true, schema: { type: string, format: date } }
      responses:
        '200': { description: 'rate + rate_date + fallback_used + source' }

  /api/v1/expense-categories:
    get:
      tags: [Codebooks]
      summary: Seznam kategorií nákladů
      description: Per-tenant číselník pro rozpad nákladů přijatých faktur (CRM/dashboard).
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: include_archived, schema: { type: boolean, default: false }, description: Zahrnout archivované }
      responses:
        '200':
          description: Seznam kategorií
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ExpenseCategory' }
    post:
      tags: [Codebooks]
      summary: Vytvoří kategorii (admin)
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, label]
              properties:
                code: { type: string, maxLength: 20, pattern: '^[a-z0-9_-]+$' }
                label: { type: string, maxLength: 100 }
                fixed_or_var: { type: string, enum: [fixed, variable] }
                display_order: { type: integer }
      responses:
        '201': { description: Created }

  /api/v1/expense-categories/{id}:
    put:
      tags: [Codebooks]
      summary: Update kategorie nákladů
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200': { description: OK }
    delete:
      tags: [Codebooks]
      summary: Smaže (nebo archivuje pokud má reference) kategorii
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200': { description: Deleted/archived }

  /api/v1/revenue-categories:
    get:
      tags: [Codebooks]
      summary: Seznam kategorií tržeb
      description: Per-tenant číselník pro rozpad tržeb vydaných faktur (CRM/dashboard/Grafy).
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: include_archived, schema: { type: boolean, default: false }, description: Zahrnout archivované }
      responses:
        '200':
          description: Seznam kategorií
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RevenueCategory' }
    post:
      tags: [Codebooks]
      summary: Vytvoří kategorii tržby (admin)
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, label]
              properties:
                code: { type: string, maxLength: 20, pattern: '^[a-z0-9_-]+$' }
                label: { type: string, maxLength: 100 }
                display_order: { type: integer }
      responses:
        '201': { description: Created }

  /api/v1/revenue-categories/{id}:
    put:
      tags: [Codebooks]
      summary: Update kategorie tržby
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200': { description: OK }
    delete:
      tags: [Codebooks]
      summary: Smaže (nebo archivuje pokud má reference) kategorii tržby
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200': { description: Deleted/archived }

  /api/v1/vat-classifications:
    get:
      tags: [Codebooks]
      summary: VAT klasifikační kódy (DPHDP3 / KH / SH)
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: direction, schema: { type: string, enum: [sale, purchase] } }
        - { in: query, name: include_archived, schema: { type: boolean } }
      responses:
        '200':
          description: List kódů (globální seed + tenant overrides)
    post:
      tags: [Codebooks]
      summary: Vytvoří custom VAT kód (per tenant)
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      responses:
        '201': { description: Created }

  /api/v1/vat-classifications/{id}:
    put:
      tags: [Codebooks]
      summary: Update VAT kódu (jen tenant rows, globální seed read-only)
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200': { description: OK }
        '403': { description: Globální seed je read-only }
    delete:
      tags: [Codebooks]
      summary: Smaže (nebo archivuje pokud má reference) VAT kód
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200': { description: Deleted/archived }

  # ── Roční daňové konstanty (globální číselník) ──────────────────────────
  /api/v1/codebooks/tax-constants:
    get:
      tags: [Codebooks]
      summary: Roční daňové konstanty (sazby, limity, paušály) za roky
      description: |
        GLOBÁLNÍ číselník (ne per-supplier) — efektivní hodnoty per rok s příznakem
        `is_override` (přepis výchozích konstant z migrace) vs. výchozí seed.
        Slouží daňovému optimalizátoru a EPO výkazům (DPFO/DPPO).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  years:
                    type: array
                    items: { $ref: '#/components/schemas/TaxConstantsYear' }

  /api/v1/codebooks/tax-constants/{year}:
    parameters:
      - in: path
        name: year
        required: true
        schema: { type: integer, minimum: 2018, maximum: 2100 }
    put:
      tags: [Codebooks]
      summary: Uloží override daňových konstant pro rok (jen admin)
      description: |
        Přepíše výchozí konstanty pro daný rok. Tělo lze poslat buď jako plochý
        objekt, nebo zabalené v `{ "data": { ... } }`. Skalární klíče jsou povinné
        (sazby, limity), vnořené (`pausal_annual`, `band_ceilings`, `expense_caps`,
        `child_credits`) musí být objekty/pole.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TaxConstantsInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  year:        { type: integer }
                  is_override: { type: boolean, example: true }
                  data:        { type: object }
        '403': { description: Pouze admin }
        '422': { description: Neplatný rok / validace selhala }
    delete:
      tags: [Codebooks]
      summary: Reset roku na výchozí konstanty (smaže override, jen admin)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  year:        { type: integer }
                  is_override: { type: boolean, example: false }
                  data:        { type: object }
        '403': { description: Pouze admin }

  # ── Purchase invoices — chybějící endpointy ──────────────────────────────
  /api/v1/purchase-invoices/export:
    get:
      tags: [Purchase invoices]
      summary: Hromadný export přijatých faktur za měsíc (PDF ZIP / ISDOC ZIP / Pohoda dataPack)
      description: |
        `pdf-zip`: ZIP s jedním PDF na fakturu. Preferuje archivovaný **originál**
        od dodavatele (`Prijata-{vs}-{vendor}.pdf`); pokud originál chybí, doplní
        **naši rekonstrukci** z dat faktury (`Prijata-{vs}-{vendor}-rekonstrukce.pdf`).
        Počet rekonstrukcí je v hlavičce `X-Export-Reconstructed`.

        `isdoc` / `pohoda`: generují XML z dat faktury (PDF nepotřebují).
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: month, required: true, schema: { type: string, pattern: '^\d{4}-\d{2}$' } }
        - { in: query, name: format, required: true, schema: { type: string, enum: [pdf-zip, isdoc, pohoda] } }
        - { in: query, name: date_by, schema: { type: string, enum: [tax, issue, received] } }
      responses:
        '200':
          description: ZIP nebo XML stream
          headers:
            X-Export-Warnings:
              schema: { type: string }
              description: Per-invoice warnings (poškozený originál, selhání rekonstrukce)
            X-Export-Reconstructed:
              schema: { type: integer }
              description: Počet faktur, u kterých se místo originálu vložila naše rekonstrukce (jen pdf-zip)

  /api/v1/purchase-invoices/{id}/activity:
