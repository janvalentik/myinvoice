              properties:
                entity_type: { type: string, enum: [client, invoice, purchase_invoice, project] }
                entity_id: { type: integer }
      responses:
        '200': { description: Aktuální vazby, content: { application/json: { schema: { type: object, properties: { links: { type: array, items: { $ref: '#/components/schemas/DocumentLink' } } } } } } }
  /api/v1/documents/by-entity/{type}/{id}:
    get:
