      summary: Dokumenty navázané na entitu (oboustranné párování)
      parameters:
        - { $ref: '#/components/parameters/SupplierIdHeader' }
        - { name: type, in: path, required: true, schema: { type: string, enum: [client, invoice, purchase_invoice, project] } }
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Navázané dokumenty, content: { application/json: { schema: { type: object, properties: { documents: { type: array, items: { $ref: '#/components/schemas/Document' } } } } } } }
  /api/v1/document-folders:
    get:
      tags: [Documents]
      summary: Strom složek (bez parametru celý plochý seznam, s parent_id přímé potomky)
      parameters:
        - { $ref: '#/components/parameters/SupplierIdHeader' }
        - { name: parent_id, in: query, schema: { type: integer, nullable: true } }
      responses:
        '200': { description: Složky, content: { application/json: { schema: { type: object, properties: { folders: { type: array, items: { $ref: '#/components/schemas/DocumentFolder' } } } } } } }
    post:
      tags: [Documents]
      summary: Vytvoření složky
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                parent_id: { type: integer, nullable: true }
      responses:
        '200': { description: ok }

  # ─────────────────────────── Pravidelné fakturace ────────────────────────
  /api/v1/recurring:
    get:
      tags: [Recurring]
      summary: Seznam šablon pravidelných fakturací
      description: |
        Stránkovaný seznam šablon aktuálního supplier-a. `meta.summary` obsahuje
        součet částek per měna + přepočet na CZK (dnešní ČNB kurz, pokud je víc měn).
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: client_id, schema: { type: integer } }
        - { in: query, name: status, schema: { type: string, enum: [active, paused, expired] } }
        - { in: query, name: sort, schema: { type: string, enum: [client, next_run, amount_czk] } }
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - { in: query, name: per_page, schema: { type: integer, minimum: 5, maximum: 200, default: 50 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/RecurringTemplate' }
                  meta: { type: object }
    post:
      tags: [Recurring]
      summary: Vytvoří šablonu pravidelné fakturace
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecurringTemplateInput' }
      responses:
        '201':
          description: Vytvořeno
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecurringTemplate' }
        '400':
          $ref: '#/components/responses/ValidationFailed'

  /api/v1/recurring/{id}:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Recurring]
      summary: Detail šablony
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecurringTemplate' }
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Recurring]
      summary: Aktualizace šablony
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecurringTemplateInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecurringTemplate' }
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Recurring]
      summary: Smaže šablonu
      responses:
        '200': { description: 'OK ({ deleted: true })' }
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/recurring/{id}/invoices:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Recurring]
      summary: Faktury vygenerované z této šablony
      description: Flat list (poslední první) — id, varsymbol, typ, stav, data, částky, currency.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { type: object } }

  /api/v1/recurring/{id}/pause:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Recurring]
      summary: Pozastaví šablonu (status → paused)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecurringTemplate' }

  /api/v1/recurring/{id}/resume:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Recurring]
      summary: Obnoví pozastavenou šablonu (status → active, přepočet next_run)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecurringTemplate' }
        '409': { description: 'Šablona vypršela (next_run > end_date)' }

  /api/v1/recurring/{id}/run-now:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Recurring]
      summary: Manuální spuštění šablony (vygeneruje fakturu / koncept)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                issue_date: { type: string, format: date, description: Vynucené datum vystavení }
                draft: { type: boolean, description: 'true = vytvořit koncept i u šablony s auto_issue' }
      responses:
        '201':
          description: 'Vygenerováno (invoice_id, varsymbol, issued, sent_to, new_next_run_date, template_status)'
        '409': { description: Šablonu nelze spustit (vypršela / chyba generování) }

