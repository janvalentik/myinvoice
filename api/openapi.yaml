        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string, nullable: true }
                tags: { type: array, items: { type: string } }
      responses:
        '200': { description: Aktualizovaný dokument, content: { application/json: { schema: { $ref: '#/components/schemas/DocumentDetail' } } } }
    delete:
      tags: [Documents]
      summary: Přesun do koše (soft-delete)
      parameters:
        - { $ref: '#/components/parameters/SupplierIdHeader' }
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: ok }
