openapi: 3.1.0
info:
  title: MyInvoice.cz REST API
  version: "1.0"
  summary: Veřejné REST API pro automatizaci fakturace
  description: |
    Veřejné API MyInvoice.cz pro integraci s e-shopy, CRM, automatizačními platformami
    (Make, Zapier) a vlastními skripty.

    ## Autentizace

    Použij Personal Access Token (PAT) v hlavičce `Authorization`:

    ```
    Authorization: Bearer mi_pat_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
    ```

    Token vytvoříš v MyInvoice → **Nastavení → API tokeny**. Plain-text se zobrazí
    pouze jednou při vytvoření — ulož si ho. Pokud token ztratíš, odvolej ho a vytvoř
    nový.

    Token má:
    - **scope** — `read` (pouze GET) nebo `read_write` (všechny operace).
    - **supplier** — pokud je token bound na konkrétního supplier-a, všechny operace
      se odehrávají v jeho kontextu. Pokud je `supplier` `null`, klient může
      přepínat přes hlavičku `X-Supplier-Id: <id>`.
    - volitelnou expiraci.

    ## Verzování

    Stabilní veřejná cesta začíná `/api/v1/`. Pokud přidáme nekompatibilní změnu,
    půjde do `/api/v2/` — `/api/v1/` zůstane funkční.

    Každá response vrací hlavičku `X-API-Version: 1`.

    ## Rate limity

    Defaultně **600 requestů / minutu / token**. Při překročení vrátíme `429 Too Many Requests`
    s hlavičkou `Retry-After` (sekundy).

    ## Chyby

    Všechny chyby mají formát:

    ```json
    { "error": { "code": "validation_failed", "message": "..." } }
    ```

  contact:
    name: MyInvoice.cz
    url: https://myinvoice.cz
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: /
    description: Aktuální origin
  - url: http://localhost:8080
    description: Docker

security:
  - BearerAuth: []

tags:
  - name: System
    description: Health-check, verze, dokumentace
  - name: Auth
    description: Identita aktuálního klienta
  - name: Tokens
    description: Správa API tokenů (jen ze session — webového UI)
  - name: Clients
    description: Klienti / odběratelé
  - name: Invoices
    description: Faktury
  - name: Projects
    description: Zakázky (vázané na klienta, jednotka pro reporting a fakturaci)
  - name: WorkReports
    description: Výkaz víceprací (po hodinách) k faktuře — vytvoření, schválení zákazníkem, PDF
  - name: InvoiceComms
    description: Email faktury, upomínky, archiv vystavených PDF, přílohy
  - name: InvoiceOps
    description: Pokročilé operace s fakturami (storno, klonování, hromadné akce, proforma→final)
  - name: Lookup
    description: ARES (CZ obchodní rejstřík), VIES (EU VAT validation)
  - name: Reports
    description: Dashboard summary, CSV exports, activity log
  - name: Bank
    description: Bankovní výpisy a párování plateb
  - name: Settings
    description: Konfigurace dodavatele a per-supplier overrides codebooku (read-only přes API)
  - name: Codebooks
    description: Číselníky (země, měny, DPH sazby, jednotky)
  - name: Documents
    description: Dokumenty — úložiště souborů, složky, ZFO datové zprávy, fulltext, párování s entitami
  - name: Purchase invoices
    description: Přijaté faktury (náklady) — evidence, položky, DPH odpočet, export, párování záloh
  - name: Recurring
    description: Pravidelné (opakované) fakturace — šablony, jejich rozvrh a generování faktur
  - name: CRM
    description: CRM dashboard — KPI, aging, koncentrace, cash-flow, action-items
  - name: Tax
    description: Daňový optimalizátor (srovnání režimů, predikce ročních limitů)

paths:
  /api/v1/health:
    get:
      tags: [System]
      summary: Health-check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }

  /api/v1/version:
    get:
      tags: [System]
      summary: Verze aplikace
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string, example: "4.3.1" }

  /api/v1/auth/api-me:
    get:
      tags: [Auth]
      summary: Identita aktuálního klienta
      description: |
        Vrátí informace o uživateli a supplier-ovi, pod kterým token / session
        operuje. Slouží jako connection-test pro integrace.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiMe' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/clients:
    get:
      tags: [Clients]
      summary: Seznam klientů
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - in: query
          name: q
          description: Fulltextové vyhledávání (název firmy / IČO)
          schema: { type: string }
        - in: query
          name: filter[archived]
          description: "1 = jen archivované, 0/chybí = jen aktivní"
          schema: { type: boolean, default: false }
        - in: query
          name: sort
          description: "Řazení (default: name)"
          schema: { type: string, default: name, enum: [name, created_at, -created_at] }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 5, maximum: 200, default: 50 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  clients:
                    type: array
                    items: { $ref: '#/components/schemas/Client' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      tags: [Clients]
      summary: Vytvoří klienta
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClientInput' }
      responses:
        '201':
          description: Vytvořeno
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Client' }
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '403':
          $ref: '#/components/responses/InsufficientScope'

  /api/v1/clients/{id}:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Clients]
      summary: Detail klienta se statistikami
      description: |
        Vrátí klienta + odvozené metriky pro detail stránku:

        - `projects` — seznam zakázek klienta,
        - `invoices_count` — celkový počet faktur,
        - `revenue_by_month` — obrat po měsících za posledních 24 měsíců (VAT-aware),
        - `revenue_by_year` — obrat po letech (VAT-aware),
        - `revenue_by_project` — obrat agregovaný per zakázka pro graf „Obrat podle zakázek"
          (faktury bez `project_id` se agregují pod `project_id: null`),
        - `unpaid_summary` — nezaplaceno / po splatnosti per měna.

        Obraty zahrnují vystavené faktury + dobropisy (`issued`, `sent`,
        `reminded`, `paid`), zálohy a koncepty se nepočítají. Pro plátce DPH
        se používá `total_without_vat`, pro neplátce `total_with_vat`.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientDetail' }
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Clients]
      summary: Aktualizace klienta
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClientInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Client' }
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Clients]
      summary: Smazání klienta (pokud nemá vystavené doklady)
      responses:
        '200':
          description: OK
        '409':
          description: Klient má vystavené doklady, použij archivaci
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/clients/{id}/archive:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Clients]
      summary: Archivuje klienta
      description: |
        Nastaví `archived_at = NOW()`. Archivovaný klient se nezobrazuje
        v defaultním seznamu, jeho historické faktury zůstávají dohledatelné.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Client' }

  /api/v1/clients/{id}/unarchive:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Clients]
      summary: Vrátí archivovaného klienta zpět do aktivních
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Client' }

  /api/v1/invoices:
    get:
      tags: [Invoices]
      summary: Seznam faktur (grouped by month)
      description: |
        Vrací faktury aktuálního supplier-a, seskupené po měsících podle `issue_date`.
        Filtry se předávají jako `filter[key]=value` (deep object). `status` a `type` mohou
        být čárkou oddělené seznamy (`filter[status]=draft,issued`).
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - in: query
          name: q
          description: Fulltextové vyhledávání (varsymbol, klient, popis)
          schema: { type: string }
        - in: query
          name: filter[status]
          description: Stav faktury — lze čárkou oddělit více hodnot
          schema:
            type: string
            example: "draft,issued"
        - in: query
          name: filter[type]
          description: Typ dokladu — lze čárkou oddělit více hodnot
          schema:
            type: string
            example: "invoice,proforma"
        - in: query
          name: filter[client_id]
          schema: { type: integer }
        - in: query
          name: filter[project_id]
          schema: { type: integer }
        - in: query
          name: filter[year]
          description: Rok (issue_date)
          schema: { type: integer, example: 2026 }
        - in: query
          name: filter[month]
          description: Měsíc 1–12 (vyžaduje filter[year])
          schema: { type: integer, minimum: 1, maximum: 12 }
        - in: query
          name: filter[date_from]
          description: Datum vystavení od (YYYY-MM-DD)
          schema: { type: string, format: date }
        - in: query
          name: filter[date_to]
          description: Datum vystavení do (YYYY-MM-DD)
          schema: { type: string, format: date }
        - in: query
          name: filter[currency]
          description: Kód měny (CZK, EUR, …)
          schema: { type: string, example: CZK }
        - in: query
          name: filter[unpaid_only]
          description: Pouze nezaplacené (issued + neuhrazené)
          schema: { type: boolean }
        - in: query
          name: filter[overdue]
          description: Pouze po splatnosti
          schema: { type: boolean }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 5, maximum: 200, default: 50 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items: { $ref: '#/components/schemas/Invoice' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
    post:
      tags: [Invoices]
      summary: Vytvoří draft faktury
      description: |
        Vytvoří fakturu ve stavu `draft`. Pro vystavení (přidělení čísla, zápis do
        DB účetně) volej `POST /api/v1/invoices/{id}/issue`.
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InvoiceInput' }
      responses:
        '201':
          description: Vytvořeno
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }
        '400':
          $ref: '#/components/responses/ValidationFailed'

  /api/v1/invoices/preview-varsymbol:
    get:
      tags: [Invoices]
      summary: Náhled budoucího čísla faktury
      description: |
        Vrátí, jaké číslo (varsymbol) by faktura dostala při vystavení, podle
        aktuální `invoice_number_template` supplier-a a stávajícího counteru —
        **bez inkrementace**. Slouží pro náhled v editoru.
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - in: query
          name: type
          schema:
            type: string
            enum: [invoice, proforma, credit_note]
            default: invoice
        - in: query
          name: issue_date
          description: Datum vystavení (YYYY-MM-DD). Default = dnes.
          schema: { type: string, format: date }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  varsymbol:
                    type: string
                    example: "JD2026-01"
                    description: Prázdný řetězec pokud supplier nemá nastavenou template.
                  has_template: { type: boolean }
        '400':
          description: Chybí zvolený supplier nebo neplatný typ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/invoices/{id}:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Invoices]
      summary: Detail faktury
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Invoices]
      summary: Aktualizace draftu
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InvoiceInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }
        '409':
          description: Faktura už není draft (vystavená/storno) — nelze editovat
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [Invoices]
      summary: Smazání draftu
      responses:
        '200':
          description: OK
        '409':
          description: Vystavenou fakturu nelze smazat (použij storno)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/invoices/{id}/issue:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Invoices]
      summary: Vystaví fakturu (z draftu)
      description: |
        Přidělí číslo dle nastavení supplier-a, archivuje PDF snapshot. Po vystavení
        nelze měnit položky/částky.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }

  /api/v1/invoices/{id}/mark-paid:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Invoices]
      summary: Označí fakturu jako uhrazenou
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                paid_at:
                  type: string
                  format: date
                  description: Datum platby (default = dnes)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }

  /api/v1/invoices/{id}/pdf:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Invoices]
      summary: PDF faktury
      responses:
        '200':
          description: PDF stream
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /api/v1/projects:
    get:
      tags: [Projects]
      summary: Seznam zakázek
      description: |
        Vrátí stránkovaný seznam **neArchivovaných** zakázek v rámci aktuálního
        supplier-a. Filtrování přes `filter[status]` a `filter[client_id]`.
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - in: query
          name: filter[status]
          schema:
            type: string
            enum: [active, paused, closed]
        - in: query
          name: filter[client_id]
          schema: { type: integer, format: int64 }
        - in: query
          name: sort
          schema:
            type: string
            enum: [name, client, revenue, last_activity]
            default: name
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 5, maximum: 200, default: 50 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Project' }
                  meta: { $ref: '#/components/schemas/ProjectsPagination' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      tags: [Projects]
      summary: Vytvoří zakázku
      description: |
        Klient (`client_id`) musí patřit aktuálnímu supplier-ovi. Currency se
        validuje proti `currencies` skoupeným pod stejným supplier-em.
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectInput' }
      responses:
        '201':
          description: Vytvořeno
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '403':
          $ref: '#/components/responses/InsufficientScope'

  /api/v1/projects/{id}:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Projects]
      summary: Detail zakázky se statistikami
      description: |
        Vrátí celý záznam zakázky + odvozené metriky:
        - `invoices_count` — kolik faktur zakázka má,
        - `revenue_by_month` — obrat po měsících za posledních 24 měsíců (per currency),
        - `revenue_by_year` — obrat po letech (per currency),
        - `unpaid_summary` — nezaplaceno / po splatnosti per currency.

        Metriky zahrnují jen vystavené faktury + dobropisy (`issued`, `sent`,
        `reminded`, `paid`); zálohy a koncepty se nepočítají.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectDetail' }
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Projects]
      summary: Aktualizace zakázky
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Projects]
      summary: Smazání zakázky
      description: |
        Smaže zakázku, pokud nemá vystavené doklady. Pro zakázky s historií
        použij `POST /api/v1/projects/{id}/archive`.
      responses:
        '200':
          description: OK
        '409':
          description: Zakázka má vystavené doklady — použij archivaci
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/projects/{id}/archive:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Projects]
      summary: Archivuje zakázku
      description: |
        Nastaví `archived_at = NOW()`. Archivované zakázky se nezobrazují
        v defaultním výpisu (lze je dohledat přes filtr).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }

  /api/v1/clients/{client_id}/projects:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: client_id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Projects]
      summary: Zakázky daného klienta (vč. archivovaných)
      description: |
        Light-weight výpis bez stránkování — vrátí všechny zakázky klienta včetně
        archivovaných (řazené active → paused → closed → archived). Užitečné pro
        plnění selectů ve frontu integrace.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ProjectBrief' }
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/projects/stats:
    get:
      tags: [Projects]
      summary: Agregované statistiky zakázek (pro dashboard a stránku Grafy)
      description: |
        Vrací agregace pro vizualizace na stránce **Grafy** (`/stats`):

        - **top_this_year / top_prev_year** — top 12 zakázek + agregovaná položka „Ostatní"
        - **top_12m** — top 12 zakázek za rolling 12 měsíců (smart-mix tabulky v UI;
          v lednu jsou per-rok statistiky téměř prázdné, rolling 12m je robustní)
        - **totals_per_year** — sumy + počty per (year, currency)
        - **status_breakdown** — counts per status (active/paused/closed)
        - **is_vat_payer** — určuje, který sloupec se použil pro agregaci obratu
          (plátce = `total_without_vat`, neplátce = `total_with_vat`)
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectStats' }

  /api/v1/invoices/{id}/work-report:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        description: ID faktury
        schema: { type: integer, format: int64 }
    get:
      tags: [WorkReports]
      summary: Výkaz víceprací k faktuře
      description: |
        Vrátí výkaz včetně všech `items` (úkony s hodinami a sazbou) nebo
        `null` pokud k faktuře žádný neexistuje.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/WorkReport'
                  - { type: "null" }
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [WorkReports]
      summary: Vytvoří nebo aktualizuje výkaz
      description: |
        Idempotentní upsert (jedna fakturace = max 1 výkaz). Výkaz lze měnit
        pouze pokud faktura má status `draft`. Admin může vynutit edit
        pomocí query parametru `?force=1` (bez ohledu na status).

        Suma `total_hours` a `total_amount` se přepočítá ze `items` na serveru.

        **Pozor:** výkaz víceprací je samostatná entita — ukládá se jen jako
        příloha (2. strana PDF) a **NEmění položky ani částku faktury**. Pokud chceš
        práci i vyúčtovat, přidej odpovídající položku faktury zvlášť přes
        `PUT /api/v1/invoices/{id}` (úprava `items`). Obojí lze dělat jen u draftu.
      parameters:
        - in: query
          name: force
          description: Admin-only override editace u nedraftových faktur
          schema: { type: boolean }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkReportInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkReport' }
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '409':
          description: Faktura není draft (a klient není admin s ?force=1)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [WorkReports]
      summary: Smaže výkaz
      responses:
        '200':
          description: OK
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/invoices/{id}/request-approval:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [WorkReports]
      summary: Pošle výkaz zákazníkovi ke schválení
      description: |
        Pre-conditions:
        - faktura je `draft` a má linknutý work-report,
        - projekt má `requires_work_report_approval = true`.

        Co se stane:
        - vygeneruje se 32-bytový `approval_token`, který dostane zákazník
          v emailu (link `/approval/{token}`),
        - faktura přejde do `approval_status = "requested"` (status zůstává `draft`),
        - alokuje se variabilní symbol a zafixují snapshoty supplier/client/bank
          (faktura se po schválení vystaví bez dalších změn),
        - zákazník dostane email `invoice_approval` s **PDF výkazu** v příloze
          (ne fakturu — tu uvidí až po vystavení),
        - příjemci: kontakty klienta s účelem `approvals` (viz `email_contacts`);
          bez nich `project.billing_emails`, fallback `client.main_email`,
        - audit log: `invoice.approval_requested`.

        Po rozhodnutí zákazníka (přes veřejný link) můžeš stav zjistit
        v `GET /api/v1/invoices/{id}` (pole `approval_*`). Pokud schválí,
        může proběhnout auto-issue + auto-send dle nastavení supplier-a.
      responses:
        '200':
          description: OK — email odeslán
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_token: { type: string, example: "a1b2…" }
                  approval_status: { type: string, example: requested }
                  recipients:
                    type: array
                    items: { type: string, format: email }
        '409':
          description: Faktura není draft / nemá výkaz / projekt nevyžaduje schválení
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/invoices/{id}/approval-status:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    put:
      tags: [WorkReports]
      summary: Ruční update schvalovacího stavu (admin override)
      description: |
        Použij když potřebuješ obejít veřejný link — např. zákazník schválil
        telefonicky a chceš to v systému zaznamenat. Audit log loguje, kdo
        rozhodnutí vložil ručně.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approval_status]
              properties:
                approval_status:
                  type: string
                  enum: [none, requested, approved, rejected]
                approval_decided_by_email:
                  type: string
                  format: email
                  description: Kdo schválil (pro audit)
                approval_rejection_reason:
                  type: string
                  description: Důvod (pokud `rejected`)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }

  /api/v1/invoices/{id}/pdfs:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [InvoiceComms]
      summary: Archiv vystavených/odeslaných verzí PDF
      description: |
        Pokaždé, když se faktura vystaví, znovu-vystaví nebo pošle e-mailem,
        se PDF archivuje. Archiv slouží jako důkaz, co přesně zákazník dostal —
        i když se snapshot na faktuře později změnil (přes admin override).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/PdfArchiveEntry' }

  /api/v1/invoices/{id}/pdfs/{archiveId}:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
      - in: path
        name: archiveId
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [InvoiceComms]
      summary: Stažení archivované verze PDF
      responses:
        '200':
          description: PDF stream
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/invoices/{id}/recipients:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [InvoiceComms]
      summary: Vyřešení e-mailoví příjemci pro odeslání
      description: |
        Vrátí příjemce, na které by se daný typ zprávy odeslal (#86) — jednotný
        `RecipientResolver`: aktivní kontakty klienta s daným účelem
        (`email_contacts`, u upomínek fallback na účel `documents`); bez kontaktů
        dosavadní logika (`main_email` + `project.billing_emails`; u schvalování
        e-maily zakázky NAHRAZUJÍ hlavní e-mail). Kombinaci s e-maily zakázky
        řídí `project.billing_emails_mode`. Read-only — nic neodesílá; hodí se
        pro náhled příjemců před voláním `/send`.
      parameters:
        - in: query
          name: type
          schema: { type: string, enum: [documents, reminders, approvals], default: documents }
          description: Typ zprávy (doklad / upomínka / žádost o schválení výkazu).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  type: { type: string, enum: [documents, reminders, approvals] }
                  to:  { type: array, items: { type: string, format: email } }
                  cc:  { type: array, items: { type: string, format: email } }
                  bcc: { type: array, items: { type: string, format: email } }
                  resolved:
                    type: array
                    description: Provenance každého příjemce (zdroj + účel + popisek).
                    items:
                      type: object
                      properties:
                        email: { type: string, format: email }
                        recipient: { type: string, enum: [to, cc, bcc] }
                        source: { type: string, enum: [contact, project, main_email] }
                        usage: { type: string, nullable: true, enum: [communication, documents, reminders, approvals, null] }
                        label: { type: string, nullable: true }
        '404': { description: Faktura nenalezena }

  /api/v1/invoices/{id}/send:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [InvoiceComms]
      summary: Pošle fakturu emailem klientovi
      description: |
        Vyrenderuje aktuální PDF, archivuje ho a odešle přes SMTP. Faktura musí
        být `issued` nebo navazující stav. Předmět + tělo z šablony `invoice_send`
        (per locale, per supplier override v Email šablonách).

        Body je volitelné — když chybí, příjemce vyřeší jednotný resolver (#86):
        kontakty klienta s účelem `documents` (vč. cc/bcc rolí); bez kontaktů
        `client.main_email` + `project.billing_emails`. Explicitní `to` v body
        je autoritativní (resolver se přeskočí). Response obsahuje
        `resolved_recipients` s provenancí každého příjemce.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                to:
                  type: array
                  items: { type: string, format: email }
                cc:
                  type: array
                  items: { type: string, format: email }
                bcc:
                  type: array
                  items: { type: string, format: email }
                subject:
                  type: string
                  description: Override předmětu emailu
                body:
                  type: string
                  description: Override těla (HTML); proměnné z šablony se nesubstituují
      responses:
        '200':
          description: OK — email odeslán
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  recipients:
                    type: array
                    items: { type: string, format: email }
                  resolved_recipients:
                    type: array
                    description: "Provenance příjemců (#86) — prázdné při explicitním `to` v body."
                    items:
                      type: object
                      properties:
                        email: { type: string, format: email }
                        recipient: { type: string, enum: [to, cc, bcc] }
                        source: { type: string, enum: [contact, project, main_email] }
                        usage: { type: string, nullable: true, enum: [communication, documents, reminders, approvals, null] }
                        label: { type: string, nullable: true }
                  archived_pdf_id: { type: integer, format: int64 }
        '409':
          description: Faktura není ve stavu pro odeslání (draft)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/invoices/{id}/reminder:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [InvoiceComms]
      summary: Pošle upomínku po splatnosti
      description: |
        Šablona `invoice_reminder` (per locale, per supplier override). Klient
        nemá vliv na obsah — text je z nastavení.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  reminder_count: { type: integer, description: Kolikátá upomínka }
        '409':
          description: Faktura není po splatnosti / je již zaplacená
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/invoices/{id}/attachments:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [InvoiceComms]
      summary: Seznam příloh faktury
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  attachments:
                    type: array
                    items: { $ref: '#/components/schemas/InvoiceAttachment' }
    post:
      tags: [InvoiceComms]
      summary: Nahraje přílohu
      description: |
        Multipart upload (max ~10 MB). Příloha se přidá do dalšího emailu faktury.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Nahráno
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvoiceAttachment' }
        '413':
          description: Soubor je příliš velký
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/invoices/{id}/attachments/{attId}:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
      - in: path
        name: attId
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [InvoiceComms]
      summary: Stažení přílohy
      responses:
        '200':
          description: Soubor (typ podle původního MIME)
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
    delete:
      tags: [InvoiceComms]
      summary: Smaže přílohu
      responses:
        '200':
          description: OK

  /api/v1/clients/lookup-ares:
    post:
      tags: [Lookup]
      summary: Načte firmu z ARES (CZ obchodní rejstřík)
      description: |
        Vrátí strukturované údaje firmy podle IČO. Vhodné jako první krok
        v „create client" flow — pošli IČO, dostaneš název, adresu, DIČ
        a flag plátce DPH, ty pak pošleš do `POST /api/v1/clients`.

        Cache 24h — opakované volání pro stejné IČO nezatíží ARES.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ic]
              properties:
                ic:
                  type: string
                  pattern: '^\d{8}$'
                  example: "27082440"
      responses:
        '200':
          description: "OK (`found: false` pokud IČO neexistuje v ARES)"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AresLookupResult' }
        '400':
          description: IČO není 8 číslic
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: ARES dočasně nedostupný
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/clients/lookup-vies:
    post:
      tags: [Lookup]
      summary: Validuje EU DIČ přes VIES
      description: |
        Validace DIČ obchodního partnera v EU. Vrátí `valid: true/false`
        a (pokud platné) registrované jméno a adresu. Cache 24h.

        Reverse-charge fakturace pro EU plátce by měla DIČ validovat před
        vystavením — VIES je oficiální zdroj pravdy EK.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vat_id]
              properties:
                vat_id:
                  type: string
                  description: DIČ ve formátu countryCode + číslo (např. DE123456789)
                  example: "DE123456789"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ViesLookupResult' }
        '400':
          description: Neplatný formát DIČ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: VIES dočasně nedostupný
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/invoices/{id}/activity:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [InvoiceOps]
      summary: Audit log faktury
      description: |
        Vrátí chronologický log všech akcí, které faktura prošla
        (created, updated, issued, sent, paid, reminded, approval_requested,
        approval_decided, cancelled, ...). Vhodné pro debugging integrace
        a zobrazení timeline v custom UI.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ActivityLogEntry' }

  /api/v1/invoices/{id}/unmark-paid:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [InvoiceOps]
      summary: Vrátí fakturu z „paid" zpět do „issued"
      description: "Reverzace omylem označené platby. Audit log: `invoice.unmark_paid`."
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }
        '409':
          description: Faktura není ve stavu `paid`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/invoices/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [InvoiceOps]
      summary: Storno vystavené faktury
      description: |
        Vystavená faktura **nelze smazat** — storno vytvoří záporný protiklad
        (`invoice_type = cancellation`) se stejnou částkou, který původní fakturu
        účetně ruší. Číselná řada je zachovaná (číslo původní faktury nezmizí).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Důvod storna (audit + volitelně do PDF)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  original:     { $ref: '#/components/schemas/Invoice' }
                  cancellation: { $ref: '#/components/schemas/Invoice' }

  /api/v1/invoices/{id}/clone:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [InvoiceOps]
      summary: Vytvoří kopii faktury jako nový draft
      description: |
        Kopíruje hlavičku + položky + work-report. Nový draft má dnešní
        `issue_date`, prázdný `number`, status `draft`. Vhodné pro periodicky
        opakované faktury (předplatné, paušál).
      responses:
        '201':
          description: Vytvořen nový draft
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }

  /api/v1/invoices/{id}/issue-final:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [InvoiceOps]
      summary: Vystaví finální fakturu ze zaplacené zálohy (proforma → invoice)
      description: |
        Pouze pro `invoice_type = proforma` ve stavu `paid`. Vytvoří finální
        daňový doklad navázaný na zálohu (`parent_id`). Číslo a snapshoty
        se zafixují stejně jako u běžného vystavení.
      responses:
        '201':
          description: Finální faktura vytvořena
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }
        '409':
          description: Zdrojový doklad není proforma `paid`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/invoices/bulk-reissue:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    post:
      tags: [InvoiceOps]
      summary: Hromadné znovu-vystavení faktur (admin)
      description: |
        Pro každou fakturu v `ids` re-renderuje PDF a uloží novou verzi do
        archivu. Existující snapshoty zůstávají (jen přibyde nová verze).
        Vhodné po globální změně nastavení supplier-a (logo, adresa apod.).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  reissued_count: { type: integer }
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        invoice_id: { type: integer }
                        reason: { type: string }

  /api/v1/invoices/bulk-reminder:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    post:
      tags: [InvoiceOps]
      summary: Hromadné odeslání upomínek
      description: |
        Pošle upomínku pro všechny faktury v `ids` (nebo všechny po splatnosti
        pokud `ids` chybí). Vhodné pro cron job „každý pondělí ráno upomínky".
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items: { type: integer, format: int64 }
                  description: Konkrétní faktury; pokud chybí, všechny po splatnosti
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent_count: { type: integer }
                  skipped_count: { type: integer }
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        invoice_id: { type: integer }
                        reason: { type: string }

  /api/v1/invoices/export.csv:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    get:
      tags: [Reports]
      summary: CSV export faktur
      description: |
        Stejné filtry jako `GET /api/v1/invoices`, ale vrátí CSV stream
        místo JSON. Vhodné pro BI / Google Sheets / Excel import.

        Sloupce: `id`, `number`, `client`, `issue_date`, `due_date`, `taxable_date`,
        `currency`, `total_excl_vat`, `total_vat`, `total_incl_vat`, `status`, `paid_at`.
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, issued, sent, reminded, paid, cancelled]
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: client_id
          schema: { type: integer }
      responses:
        '200':
          description: CSV stream
          content:
            text/csv:
              schema: { type: string }

  /api/v1/dashboard/summary:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    get:
      tags: [Reports]
      summary: Dashboard summary — KPI, top klienti, obrat, forecasty, statistiky
      description: |
        Agregovaná data pro Dashboard i stránku Grafy (`/stats`). Endpoint
        sjednocuje desítky agregací do jednoho dotazu (cache je řízena DB
        cache tabulkami `*_revenue_cache`).

        **Obrat (VAT-aware):**
        Pro plátce DPH (`supplier.is_vat_payer = 1`) se ve všech agregacích
        obratu používá `total_without_vat`; pro neplátce `total_with_vat`.
        Vrácený flag `is_vat_payer` to indikuje.

        **Obsah:**
        - **kpi** — obrat per měna (this/prev year + YTD loni) + počty faktur,
          klientů a zakázek per rok + ø doba úhrady + overdue,
        - **overdue / unpaid_upcoming** — tabulky faktur po/před splatnosti,
        - **top_clients_ytd / top_clients_prev_year** — top 12 klientů YTD a loni,
        - **top_clients_12m** — top 12 klientů za rolling 12 měsíců (smart-mix v UI),
        - **revenue_by_month** — 12 + 12 měsíců (rolling + prev_year) per měna,
        - **revenue_by_year** — všechny roky s aktivitou,
        - **rolling_12m** — plovoucí 12měsíční obrat per měna (+ 12m předtím
          pro YoY); relevantní pro DPH limit (2 mil. Kč),
        - **revenue_last_30d** — live obrat za posledních 30 dní per měna,
        - **revenue_forecast** — predikce ročního obratu (medián tří projekcí: run-rate / krátkodobý růst / trend, vč. rozpětí),
        - **cashflow_ytd** — kumulativní inkasované platby letošek vs loni,
        - **cashflow_forecast** — co přiteče z neuhrazených v 30/60/90 dnech,
        - **due_buckets** — splatné dnes / tento týden / tento měsíc,
        - **aging_report** — stáří pohledávek (current/1-30/31-60/61-90/90+),
        - **payment_days_histogram** — distribuce doby úhrady (12m),
        - **vat_breakdown_12m** — rozpad obratu per sazba DPH (jen plátce DPH),
        - **invoice_size_histogram** — distribuce velikosti faktur v CZK ekv.,
        - **active_clients_count / active_recurring_count** — counts,
        - **pending_approvals** — počet žádostí o schválení výkazu,
        - **is_vat_payer / today / year / prev_year** — kontext.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardSummary' }

  /api/v1/bank-statements:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    get:
      tags: [Bank]
      summary: Seznam nahraných bankovních výpisů
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/BankStatement' }

  /api/v1/bank-statements/{id}:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Bank]
      summary: Detail výpisu vč. všech transakcí
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BankStatementDetail' }
    delete:
      tags: [Bank]
      summary: Smaže výpis vč. transakcí a payment_matches (admin only)
      description: |
        Cascade delete přes FK constraints — smaže transakce výpisu i jejich
        payment_matches záznamy. Status zaplacených faktur se NEzmění (případný
        rollback paid→issued je doménou uživatele přes /unmatch endpoint).

        Vyžaduje roli `admin`. Účetní (`accountant`) může nahrávat a párovat,
        ale ne mazat (forensic integrity uzávěrek DPH/KH).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean, example: true }
        '403': { description: "Forbidden — role není admin" }
        '404': { description: "Výpis nenalezen nebo nepatří current supplier" }

  /api/v1/bank-statements/{id}/download:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Bank]
      summary: Stáhne originální obsah GPC souboru
      description: |
        Vrací bajt-přesný originál uploadovaného GPC souboru (uložený od v4.1.0
        v `bank_statements.file_content`). Pro výpisy importované před v4.1.0
        není soubor k dispozici → 410 Gone.

        Klient si může před voláním zkontrolovat pole `has_file` v `BankStatement`.
      responses:
        '200':
          description: OK — GPC bajty
          headers:
            Content-Disposition:
              schema: { type: string }
              description: 'attachment; filename="<original-filename>"'
          content:
            text/plain:
              schema: { type: string, format: binary }
        '404': { description: "Výpis nenalezen" }
        '410': { description: "Soubor není k dispozici (importováno před v4.1.0)" }

  /api/v1/bank-transactions/{id}/match:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Bank]
      summary: Ručně přiřadí transakci k faktuře (a označí ji paid)
      description: |
        Použij když automatický matching nezachytil platbu (variabilní symbol
        chybí nebo neodpovídá). Označí transakci jako `matched`, fakturu jako
        `paid` s `paid_at = transaction.posted_at`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoice_id]
              properties:
                invoice_id: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction: { $ref: '#/components/schemas/BankTransaction' }
                  invoice: { $ref: '#/components/schemas/Invoice' }

  /api/v1/bank-transactions/{id}/unmatch:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Bank]
      summary: Odpojí transakci od faktury (a vrátí fakturu z paid → issued)
      responses:
        '200':
          description: OK

  /api/v1/bank-transactions/{id}/ignore:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Bank]
      summary: Označí transakci jako „ignorovat" (nesedí na žádnou fakturu)
      responses:
        '200':
          description: OK

  /api/v1/settings/supplier:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    get:
      tags: [Settings]
      summary: Detail aktuálního dodavatele
      description: |
        Vrátí kompletní data supplier-a v jehož scope token operuje — adresa,
        IČO/DIČ, bankovní účty, číslování faktur, default platební podmínky.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SupplierFull' }

  /api/v1/suppliers:
    get:
      tags: [Settings]
      summary: Seznam všech dodavatelů, ke kterým má token přístup
      description: |
        Užitečné pro klienta, který chce zjistit `id` supplier-ů (pro X-Supplier-Id
        header u tokenu bez bind, nebo pro multi-supplier reporting).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/SupplierBrief' }

  /api/v1/suppliers/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      tags: [Settings]
      summary: Detail konkrétního dodavatele
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SupplierFull' }

  /api/v1/settings/currencies:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    get:
      tags: [Settings]
      summary: Měny nakonfigurované pro aktuálního dodavatele
      description: |
        Per-supplier override hlavního codebooku — obsahuje i bank-accounts
        per currency. Mutace (POST/PUT/DELETE) jsou jen přes UI, ne přes API.
      responses:
        '200':
          description: OK

  /api/v1/settings/vat-rates:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    get:
      tags: [Settings]
      summary: DPH sazby aktuálního dodavatele
      responses:
        '200':
          description: OK

  /api/v1/settings/units:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    get:
      tags: [Settings]
      summary: Měrné jednotky aktuálního dodavatele
      responses:
        '200':
          description: OK

  /api/v1/settings/countries:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    get:
      tags: [Settings]
      summary: Země nakonfigurované pro aktuálního dodavatele
      responses:
        '200':
          description: OK

  /api/v1/bank-statements/upload:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    post:
      tags: [Bank]
      summary: Nahraje bankovní výpis (GPC/CSV/ABO)
      description: |
        Multipart upload. Server detekuje formát z obsahu a parsuje transakce.
        Auto-matching proti otevřeným fakturám se spustí po `POST /scan`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: GPC, CSV (FIO/KB/MB formáty) nebo ABO výpis
      responses:
        '201':
          description: Naparsováno
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BankStatement' }
        '400':
          description: Neznámý formát / poškozený soubor
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/bank-statements/scan:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    post:
      tags: [Bank]
      summary: Auto-matching transakcí proti otevřeným fakturám
      description: |
        Pro všechny `unmatched` transakce zkusí najít fakturu podle:
        - variabilního symbolu (přesný match) — preferovaná cesta,
        - částky + protiúčtu (fallback).

        Pokud najde unikátní match, transakce se označí `matched`, faktura
        `paid` s `paid_at = transaction.posted_at`. Multi-match transakce
        zůstávají nepřiřazené pro manuální rozhodnutí.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                statement_id:
                  type: integer
                  format: int64
                  description: Pokud chybí, scan-uje všechny unmatched napříč všemi výpisy
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  matched_count: { type: integer }
                  multi_match_count:
                    type: integer
                    description: Transakce s víc kandidáty (nepárované, vyžadují ruční rozhodnutí)
                  remaining_unmatched: { type: integer }

  /api/v1/codebooks/countries:
    get:
      tags: [Codebooks]
      summary: Seznam zemí
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  countries:
                    type: array
                    items: { $ref: '#/components/schemas/Country' }

  /api/v1/codebooks/currencies:
    get:
      tags: [Codebooks]
      summary: Seznam podporovaných měn
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  currencies:
                    type: array
                    items: { $ref: '#/components/schemas/Currency' }

  /api/v1/codebooks/vat-rates:
    get:
      tags: [Codebooks]
      summary: Seznam DPH sazeb
      responses:
        '200':
          description: OK

  /api/v1/codebooks/units:
    get:
      tags: [Codebooks]
      summary: Seznam měrných jednotek
      responses:
        '200':
          description: OK

  /api/v1/codebooks/years:
    parameters:
      - $ref: '#/components/parameters/SupplierIdHeader'
    get:
      tags: [Codebooks]
      summary: Distinct roky z faktur (zdroj pro year filter dropdown)
      description: |
        Vrací DISTINCT `YEAR(issue_date)` z `invoices` a `purchase_invoices`
        per aktuální supplier. Backend navíc doplňuje aktuální + minulý rok
        do `combined` setu (aby UI dropdown nikdy nebyl prázdný — fresh setup
        bez dokladů).

        Použij pro historické datové migrace (Fakturoid, iDoklad — typicky
        5-10+ let), kde hardcoded posledních N let v UI by data zakryl.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items: { type: integer }
                    example: [2026, 2025, 2024, 2023, 2018]
                    description: Distinct roky z `invoices` (vystavené)
                  purchase_invoices:
                    type: array
                    items: { type: integer }
                    example: [2026, 2025, 2024]
                    description: Distinct roky z `purchase_invoices` (přijaté)
                  combined:
                    type: array
                    items: { type: integer }
                    example: [2026, 2025, 2024, 2023, 2018]
                    description: Sjednocení obou množin + aktuální a minulý rok jako floor

  # ------------------------------------------------------------
  # Recurring invoice templates (pravidelné fakturace) — admin API
  # ------------------------------------------------------------
  /api/recurring:
    get:
      tags: [Recurring]
      summary: Seznam šablon pravidelných faktur (scoped na aktuálního dodavatele)
      parameters:
        - in: query
          name: client_id
          schema: { type: integer }
          description: Filtr na klienta
        - in: query
          name: status
          schema:
            type: string
            enum: [active, paused, expired]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/RecurringTemplate' }
    post:
      tags: [Recurring]
      summary: Vytvořit šablonu pravidelné faktury
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecurringTemplateInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecurringTemplate' }

  /api/recurring/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      tags: [Recurring]
      summary: Detail šablony
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecurringTemplate' }
        '404': { description: Nenalezena }
    put:
      tags: [Recurring]
      summary: Update šablony
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecurringTemplateInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecurringTemplate' }
    delete:
      tags: [Recurring]
      summary: Smazat šablonu (vygenerované faktury zůstanou, jen ztratí vazbu)
      responses:
        '200':
          description: OK

  /api/recurring/{id}/invoices:
    get:
      tags: [Recurring]
      summary: Seznam faktur vygenerovaných z této šablony (poslední první)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        varsymbol: { type: string, nullable: true }
                        invoice_type: { type: string }
                        status: { type: string }
                        issue_date: { type: string, format: date }
                        due_date: { type: string, format: date }
                        paid_at: { type: string, format: date, nullable: true }
                        total_with_vat: { type: number, format: float }
                        amount_to_pay: { type: number, format: float }
                        currency: { type: string }

  /api/recurring/{id}/pause:
    post:
      tags: [Recurring]
      summary: Pozastavit šablonu (cron přeskočí, dokud není resumed)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK

  /api/recurring/{id}/resume:
    post:
      tags: [Recurring]
      summary: Obnovit šablonu (vyžaduje next_run_date <= end_date)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
        '409':
          description: Šablona vypršela (next_run > end_date)

  /api/recurring/{id}/run-now:
    post:
      tags: [Recurring]
      summary: Manuálně vygenerovat fakturu ze šablony (pro testování)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                issue_date:
                  type: string
                  format: date
                  description: "Volitelný override; default = next_run_date šablony"
      responses:
        '201':
          description: Faktura vygenerována
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoice_id: { type: integer }
                  varsymbol: { type: string, nullable: true }
                  issued:    { type: boolean }
                  sent_to:   { type: array, items: { type: string } }
                  new_next_run_date: { type: string, format: date, nullable: true }
                  template_status:   { type: string, enum: [active, paused, expired] }

  # ============================================================================
  # Purchase invoices (přijaté faktury) — fáze 1 integrace forku
  # ============================================================================
  /api/v1/purchase-invoices:
    get:
      tags: [Purchase invoices]
      summary: Seznam přijatých faktur seskupený po měsících
      description: |
        Vrací přijaté faktury aktuálního tenant (supplier_id), seskupené podle
        `COALESCE(tax_date, issue_date)` per měsíc. Stejný response tvar jako
        `/invoices` ale s `vendor_*` poli místo `client_*`.
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - in: query
          name: filter[status]
          schema: { type: string, enum: [draft, received, booked, paid, cancelled] }
        - in: query
          name: filter[document_kind]
          schema: { type: string, enum: [invoice, receipt, credit_note, advance] }
        - in: query
          name: filter[vendor_id]
          schema: { type: integer }
        - in: query
          name: filter[year]
          schema: { type: integer }
        - in: query
          name: filter[month]
          schema: { type: integer }
        - in: query
          name: filter[unpaid_only]
          schema: { type: boolean }
        - in: query
          name: filter[overdue]
          schema: { type: boolean }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        month: { type: string, example: "2026-05" }
                        count: { type: integer }
                        totals_per_currency:
                          type: array
                          items:
                            type: object
                            properties:
                              currency: { type: string }
                              without_vat: { type: number }
                              vat: { type: number }
                              with_vat: { type: number }
                        invoices:
                          type: array
                          items: { $ref: '#/components/schemas/PurchaseInvoiceListItem' }
                  meta:
                    type: object
                    properties:
                      total: { type: integer }
                      page: { type: integer }
                      per_page: { type: integer }
                      pages: { type: integer }
    post:
      tags: [Purchase invoices]
      summary: Vytvoří draft přijaté faktury
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PurchaseInvoicePayload' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PurchaseInvoice' }
        '400': { description: Validation error }

  /api/v1/purchase-invoices/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      tags: [Purchase invoices]
      summary: Detail přijaté faktury
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PurchaseInvoice' }
        '404': { description: Nenalezeno }
    put:
      tags: [Purchase invoices]
      summary: Update přijaté faktury (jen draft)
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - in: query
          name: force
          description: Admin override pro received status (booked/paid/cancelled neumožněno).
          schema: { type: boolean }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PurchaseInvoicePayload' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PurchaseInvoice' }
        '409': { description: Not editable }
    delete:
      tags: [Purchase invoices]
      summary: Smaže draft (vystavené faktury použij transition cancel)
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      responses:
        '200': { description: OK }
        '409': { description: Lze smazat jen draft }

  /api/v1/purchase-invoices/{id}/items:
    put:
      tags: [Purchase invoices]
      summary: Přepíše položky a přepočte sumy
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - $ref: '#/components/parameters/SupplierIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items: { $ref: '#/components/schemas/PurchaseInvoiceItemPayload' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PurchaseInvoice' }

  /api/v1/purchase-invoices/{id}/exchange-rate:
    post:
      tags: [Purchase invoices]
      summary: Nastaví exchange rate manuálně
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - $ref: '#/components/parameters/SupplierIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rate: { type: number, nullable: true }
                rate_date: { type: string, format: date, nullable: true }
                source: { type: string, enum: [cnb, manual, idoklad, fakturoid], default: manual }
      responses:
        '200': { description: OK }

  /api/v1/purchase-invoices/{id}/transition:
    post:
      tags: [Purchase invoices]
      summary: Přechod stavu (state machine draft → received → booked → paid; + cancelled)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - $ref: '#/components/parameters/SupplierIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target: { type: string, enum: [received, booked, paid, cancelled] }
                paid_date:
                  type: string
                  format: date
                  description: Pouze pro target=paid (default = dnes)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PurchaseInvoice' }
        '409': { description: Invalid transition }

  /api/v1/purchase-invoices/{id}/pdf:
    post:
      tags: [Purchase invoices]
      summary: Upload originálního PDF od dodavatele (archive + SHA-256 dedup)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - $ref: '#/components/parameters/SupplierIdHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF dokument (max 20 MiB, magic bytes %PDF- validation)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  pdf_path: { type: string }
                  pdf_hash: { type: string, description: SHA-256 hex }
                  pdf_size_bytes: { type: integer }
                  pdf_original_name: { type: string }
        '409':
          description: Stejné PDF už archivováno u jiné faktury (existing_purchase_invoice_id v error.extra)
        '413': { description: File too large (> 20 MiB) }
    get:
      tags: [Purchase invoices]
      summary: Stáhne archivované PDF od dodavatele
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200':
          description: PDF stream
          content:
            application/pdf: {}
        '404': { description: K faktuře není archivovaný PDF }

  /api/v1/purchase-invoices/{id}/our-pdf:
    get:
      tags: [Purchase invoices]
      summary: Naše PDF rekonstrukce přijaté faktury (mPDF z dat)
      description: |
        Vygeneruje naši vlastní PDF kopii přijaté faktury. Užitečné když chybí
        originál (importované jen metadata) nebo chceme vlastní layout.
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: inline, schema: { type: integer, enum: [0,1] }, description: '1 = Content-Disposition: inline (iframe preview)' }
      responses:
        '200':
          description: PDF stream
          content:
            application/pdf: {}
        '404': { description: Faktura nenalezena }

  /api/v1/purchase-invoices/{id}/isdoc:
    get:
      tags: [Purchase invoices]
      summary: ISDOC 6.0 XML export přijaté faktury
      description: |
        Role inversion — pro přijatou je `AccountingSupplierParty` = vendor,
        `AccountingCustomerParty` = náš tenant.
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200':
          description: ISDOC XML
          content:
            application/xml: {}
        '404': { description: Faktura nenalezena }

  /api/v1/purchase-invoices/{id}/pohoda:
    get:
      tags: [Purchase invoices]
      summary: Pohoda XML (dataPack s `<pur:purchase>`) export přijaté faktury
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - $ref: '#/components/parameters/SupplierIdHeader'
      responses:
        '200':
          description: Pohoda XML
          content:
            application/xml: {}
        '404': { description: Faktura nenalezena }

  /api/v1/purchase-invoices/scan-inbox:
    post:
      tags: [Purchase invoices]
      summary: Scan adresáře s PDF/ISDOC pro automatický import (admin/accountant only)
      description: |
        Rekurzivně projde adresář nastavený v `cfg.purchase_invoice.inbox_dir`,
        deduplikuje přes SHA-256 (vůči `purchase_invoices.pdf_hash`). Z PDF s embedded
        ISDOC rozpozná data a automaticky vytvoří draft přijaté faktury. Pure PDF bez
        ISDOC se přeskakují — pro AI extrakci použij endpoint
        `POST /api/integrations/anthropic/extract` (BYOK).
      parameters: [{ $ref: '#/components/parameters/SupplierIdHeader' }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                dry_run:
                  type: boolean
                  description: True = jen vrátit seznam nálezů bez zápisu
                  default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InboxScanResult' }
        '403': { description: Pouze admin/accountant }

  /api/v1/reports/dphdp3/preview:
    get:
      tags: [Reports]
      summary: Náhled DPH přiznání (DPHDP3) pro období
      description: |
        ⚠️ XML vygenerovaný buildem je POUZE POMŮCKA. Před odesláním na EPO portál
        MFČR vždy ověř s účetní.
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year,   required: true, schema: { type: integer, minimum: 2020, maximum: 2050 } }
        - { in: query, name: month,  schema: { type: integer, minimum: 1, maximum: 12 }, description: 'Pro měsíční periodu' }
        - { in: query, name: quarter, schema: { type: integer, minimum: 1, maximum: 4 }, description: 'Pro kvartální periodu' }
      responses:
        '200':
          description: JSON summary (lines 1-29 + 40+, totals, deadline)
          content:
            application/json:
              schema: { type: object }
        '403': { description: Pouze admin/accountant }

  /api/v1/reports/dphdp3:
    get:
      tags: [Reports]
      summary: Stáhne XML DPH přiznání (DPHDP3 verzePis 03.01) pro EPO portál
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year, required: true, schema: { type: integer } }
        - { in: query, name: month, schema: { type: integer } }
        - { in: query, name: quarter, schema: { type: integer } }
      responses:
        '200':
          description: XML download
          content:
            application/xml: {}
        '403': { description: Pouze admin/accountant }

  /api/v1/reports/dphkh1/preview:
    get:
      tags: [Reports]
      summary: Náhled Kontrolního hlášení (DPHKH1) — vždy měsíční
      description: |
        Kontrolní hlášení se podává **vždy měsíčně**, i pro kvartální plátce DPH.
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year,  required: true, schema: { type: integer } }
        - { in: query, name: month, required: true, schema: { type: integer, minimum: 1, maximum: 12 } }
      responses:
        '200': { description: Summary s counts sekcí A.1/A.4/A.5/B.1/B.2/B.3 }
        '403': { description: Pouze admin/accountant }

  /api/v1/reports/dphkh1:
    get:
      tags: [Reports]
      summary: Stáhne XML Kontrolního hlášení (DPHKH1 verzePis 03.01)
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year,  required: true, schema: { type: integer } }
        - { in: query, name: month, required: true, schema: { type: integer } }
      responses:
        '200':
          description: XML download
          content:
            application/xml: {}

  /api/v1/reports/dphshv/preview:
    get:
      tags: [Reports]
      summary: Náhled Souhrnného hlášení (EU dodání) — měsíční
      description: |
        Souhrnné hlášení podávají **plátci DPH i identifikované osoby** s alespoň
        1 EU dodávkou v měsíci. Mapování VAT kódů: 20→0 (zboží), 22→2 (služby).
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year,  required: true, schema: { type: integer } }
        - { in: query, name: month, required: true, schema: { type: integer } }
      responses:
        '200': { description: Summary s řádky (country, vat_id, sh_type, amount, count) }

  /api/v1/reports/dphshv:
    get:
      tags: [Reports]
      summary: Stáhne XML Souhrnného hlášení (DPHSHV verzePis 06.01)
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year,  required: true, schema: { type: integer } }
        - { in: query, name: month, required: true, schema: { type: integer } }
      responses:
        '200':
          description: XML download
          content:
            application/xml: {}

  /api/v1/reports/income-tax/preview:
    get:
      tags: [Reports]
      summary: Náhled daňového přiznání (DPFO/DPPO) — roční, MVP foundation
      description: |
        ⚠️ **MVP only** — výkaz NENÍ kompletní. Generuje XML kostru s identifikací
        poplatníka a orientačními čísly (tržby/náklady z faktur). Účetní data
        (odpisy, mzdy, soc/zdrav, zálohy, slevy) MyInvoice neeviduje — doplnit
        v účetním software nebo ve spolupráci s poradcem.
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year, schema: { type: integer }, description: 'Default = předchozí rok' }
        - { in: query, name: type, required: true, schema: { type: string, enum: [fo, po] } }
      responses:
        '200': { description: Orientational summary }

  /api/v1/reports/income-tax:
    get:
      tags: [Reports]
      summary: Stáhne XML daňového přiznání DPFO (DPFDP5) nebo DPPO (DPPDP9)
      parameters:
        - $ref: '#/components/parameters/SupplierIdHeader'
        - { in: query, name: year, schema: { type: integer } }
        - { in: query, name: type, required: true, schema: { type: string, enum: [fo, po] } }
      responses:
        '200':
          description: XML download (kostra)
          content:
            application/xml: {}

  # ── Tax submissions archive ──────────────────────────────────────────────
  /api/v1/reports/submissions:
    get:
