# MyInvoice.cz — Docker Compose
#
# Services:
#   app     — PHP 8.5 + nginx + php-fpm (built from Dockerfile.alpine)
#   db      — MariaDB 11 with persistent volume
#   redis   — optional cache/session backend (profile: redis)
#
# Default image je alpine/nginx (~92 MB, méně RAM). Debian/Apache fallback:
# `docker build -f Dockerfile -t myinvoice:latest .` (Dockerfile zůstává v repu, CI ho nepublikuje).
#
# First run:   cmd/docker-install.{sh,ps1}     (creates cfg.php, brings stack up, runs migrations)
# Build:       cmd/docker-build.{sh,ps1}       (rebuilds the app image)
# Daily:       docker compose up -d / down
# Logs:        docker compose logs -f app
#
# Volume layout (od 3.6.0): single-volume default. Jediný `app-data:/data`
# drží VŠECHEN stateful obsah — log/, storage/{invoices,uploads,backup,sessions,cache},
# private/dkim/, **i `cfg.local.php`** generovaný setup wizardem. Image i bind-mount
# `cfg.docker.php` zůstávají read-only — image updaty jsou bezbolestné a per-instance
# konfigurace (app.url, auth.require_totp) přežije.
#
# Upgrade z 3-volume layoutu (3.5.x a starší): `cmd/docker-update.{sh,ps1}` autodetekuje
# staré volumes a spustí migraci automaticky před `up -d`. Manuální migrace:
# `cmd/docker-migrate-volumes.{sh,ps1}`.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.alpine
    image: myinvoice:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      # OPTIONAL — Docker-specific cfg. Image obsahuje stub `cfg.php` (`<?php return [];`)
      # a všechnu konfiguraci lze předat přes ENV (12-factor). Pro full-ENV deploy
      # (Railway, Heroku, Fly.io) tento mount zakomentuj/odstraň.
      # docker-install.{sh,ps1} generates cfg.docker.php with db=db, redis=redis hostnames.
      - ./cfg.docker.php:/var/www/html/cfg.php:ro
      # Single-volume layout (od 3.6.0). Drží log/, storage/, private/dkim/ i cfg.local.php.
      - app-data:/data
    environment:
      TZ: Europe/Prague
      # Sjednocuje všechny stateful cesty pod /data (viz Config::applyDataDirOverrides()).
      MYINVOICE_DATA_DIR: /data
      # Vestavěný cron v app kontejneru (default 1). Při více replikách app nastav 0
      # v jedné běžící replice ho nech zapnutý, jinak by úlohy běžely vícenásobně.
      MYINVOICE_ENABLE_CRON: ${MYINVOICE_ENABLE_CRON:-1}

  db:
    image: mariadb:11
    restart: unless-stopped
    # Tuning pro hosting s málo pamětí/diskem:
    #   - performance_schema OFF → ~100–200 MB méně RAM
    #   - buffer pool 128 MB (RAM) — sniž na 64M přes DB_INNODB_BUFFER_POOL pro malý stroj
    #   - redo log 48 MB místo default 96 MB → ~50 MB méně na disku (DB_INNODB_LOG_SIZE)
    # MariaDB redo log při startu bezpečně přesází (po čistém shutdownu), data zůstávají.
    command:
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=${DB_INNODB_BUFFER_POOL:-128M}
      - --innodb-log-file-size=${DB_INNODB_LOG_SIZE:-48M}
    environment:
      # Fail-closed: bez .env se stack nespustí (žádný předvídatelný default).
      # docker-install.{sh,ps1} vygeneruje .env s náhodnými hesly před `up`.
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD required — spusť cmd/docker-install nebo vytvoř .env}
      MARIADB_DATABASE: ${DB_NAME:-myinvoice}
      MARIADB_USER: ${DB_USER:-myinvoice}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required — spusť cmd/docker-install nebo vytvoř .env}
      TZ: Europe/Prague
    volumes:
      - db-data:/var/lib/mysql
    ports:
      # Expose only on loopback by default — comment out to keep DB internal-only
      - "127.0.0.1:${DB_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["redis"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  db-data:
  app-data:
  redis-data:
